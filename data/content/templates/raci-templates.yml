id: raci-vendor-assessment
type: raci_template
category: risk-management
title: "RACI Matrix -- Vendor Security Assessment"
summary: "Responsibility assignment matrix for third-party vendor security assessment covering vendor selection, security questionnaires, contract requirements, ongoing monitoring, and exit planning."
source: "ISO 27001:2022 A.5.19-A.5.23, NIS2 Article 21(2)(d), DORA Article 28"
tags: "raci, vendor-management, third-party, supply-chain, assessment, tprm"
metadata:
  roles: "CISO, Vendor Manager, Procurement, Legal, Security Analyst, Business Owner, DPO"
  deliverables: "Vendor register, assessment reports, contract security clauses, monitoring schedule"
content: |
  ## RACI Matrix: Vendor Security Assessment

  | Activity | CISO | Vendor Mgr | Procurement | Legal | Sec Analyst | Biz Owner | DPO |
  |----------|------|-----------|------------|-------|------------|-----------|-----|
  | Vendor criticality classification | A | R | C | I | C | R | C |
  | Security questionnaire design | A | C | I | C | R | I | C |
  | Vendor security assessment | I | A | I | I | R | C | C |
  | SOC 2 / ISO 27001 report review | I | A | I | I | R | I | I |
  | Risk rating assignment | A | R | I | I | R | C | I |
  | Contract security clauses | C | C | C | A | R | C | C |
  | Data processing agreement | I | C | C | A | C | C | R |
  | Vendor approval decision | A | R | C | C | C | R | C |
  | Annual vendor reassessment | I | A | I | I | R | C | C |
  | Vendor incident notification | A | R | I | R | R | I | C |
  | Vendor offboarding | I | A | R | R | R | R | C |
  | Exit plan maintenance | I | A | C | C | C | R | I |
  | Sub-processor tracking | I | R | I | C | C | I | A |
  | Concentration risk review | A | R | I | I | R | C | I |
  | Vendor register maintenance | I | A | C | I | C | C | I |

  ### Notes
  - Business Owner requests and justifies vendor engagement -- shares accountability for vendor risk
  - DPO involved when vendor processes personal data (GDPR requirements)
  - Legal owns contractual terms; Security Analyst provides security clause content
  - Critical vendors require annual reassessment and SOC 2 / ISO 27001 evidence
  - DORA entities: additional requirements for ICT third-party register and concentration risk

