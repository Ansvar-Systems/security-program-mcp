id: raci-soc-operations
type: raci_template
category: security-operations
title: "RACI Matrix -- SOC Operations Setup"
summary: "Responsibility assignment matrix for establishing Security Operations Center operations covering SIEM deployment, alert triage, detection engineering, threat hunting, and shift management."
source: "MITRE ATT&CK, NIST SP 800-61, SANS SOC model"
tags: "raci, soc, siem, detection, threat-hunting, monitoring, triage"
metadata:
  roles: "CISO, SOC Manager, L1 Analyst, L2 Analyst, L3/Threat Hunter, Detection Engineer, IT Operations"
  deliverables: "SIEM configuration, detection rules, triage procedures, shift schedule, metrics dashboard"
content: |
  ## RACI Matrix: SOC Operations

  | Activity | CISO | SOC Mgr | L1 Analyst | L2 Analyst | L3/Hunter | Det Engineer | IT Ops |
  |----------|------|---------|-----------|-----------|----------|-------------|--------|
  | SOC charter and scope | A | R | I | I | I | I | I |
  | SIEM deployment | I | A | I | C | C | R | R |
  | Log source onboarding | I | A | I | C | C | R | R |
  | Detection rule development | I | A | I | C | R | R | I |
  | Detection rule tuning | I | A | C | R | C | R | I |
  | Alert triage (initial) | I | A | R | I | I | I | I |
  | Alert investigation | I | A | I | R | C | I | I |
  | Incident escalation | I | A | R | R | I | I | I |
  | Threat hunting campaigns | I | A | I | C | R | C | I |
  | Threat intel integration | I | A | I | C | R | R | I |
  | Shift scheduling | I | R | I | I | I | I | I |
  | Runbook maintenance | I | A | C | R | C | C | I |
  | False positive management | I | A | R | R | C | R | I |
  | Metrics and reporting | A | R | C | C | C | C | I |
  | SOC tool maintenance | I | A | I | I | I | R | R |
  | Purple team exercises | I | A | I | R | R | R | C |

  ### Notes
  - L1 handles initial triage and known-pattern responses
  - L2 handles investigation of escalated alerts and complex analysis
  - L3/Threat Hunter conducts proactive hunting and handles advanced incidents
  - Detection Engineer owns the technical detection content (rules, parsers, enrichment)
  - SOC Manager owns staffing, scheduling, and operational metrics

