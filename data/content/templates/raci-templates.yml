id: raci-access-control
type: raci_template
category: security-operations
title: "RACI Matrix -- Access Control Rollout"
summary: "Responsibility assignment matrix for implementing identity and access management controls including provisioning, MFA deployment, privileged access management, and access reviews."
source: "ISO 27001:2022 A.5.15-A.5.18, A.8.2-A.8.5"
tags: "raci, access-control, iam, mfa, pam, provisioning, access-review"
metadata:
  roles: "CISO, IAM Lead, IT Operations, HR, Application Owners, Security Engineer, Auditor"
  deliverables: "Access control policy, MFA deployment, PAM solution, access review schedule"
content: |
  ## RACI Matrix: Access Control Rollout

  | Activity | CISO | IAM Lead | IT Ops | HR | App Owner | Sec Engineer | Auditor |
  |----------|------|---------|--------|------|-----------|-------------|---------|
  | Access control policy | A | R | C | C | C | C | I |
  | Identity provider setup | I | A | R | I | I | R | I |
  | User provisioning workflow | I | A | R | R | C | C | I |
  | Deprovisioning workflow | I | A | R | R | C | C | I |
  | MFA deployment plan | A | R | C | I | C | R | I |
  | MFA enrollment (users) | I | A | R | C | I | I | I |
  | SSO integration | I | A | C | I | R | R | I |
  | PAM solution deployment | A | R | C | I | I | R | I |
  | Service account inventory | I | A | C | I | R | R | I |
  | Role-based access design | I | A | C | C | R | C | I |
  | Quarterly access reviews | A | R | C | C | R | I | C |
  | Access review remediation | I | A | R | C | R | I | I |
  | Orphaned account cleanup | I | A | R | R | C | I | I |
  | Privileged access monitoring | I | A | I | I | I | R | C |
  | Access control audit | I | C | C | I | C | I | R |
  | Emergency access procedure | A | R | R | I | C | C | I |

  ### Notes
  - HR triggers provisioning (hire) and deprovisioning (termination) -- must be tightly integrated with IAM
  - Application Owners define role-based access for their applications
  - Quarterly access reviews: IAM Lead coordinates, Application Owners execute review, Auditor verifies
  - PAM deployment requires Security Engineer for technical setup and IAM Lead for policy configuration

