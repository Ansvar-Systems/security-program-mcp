id: raci-patch-management
type: raci_template
category: security-operations
title: "RACI Matrix -- Patch Management"
summary: "Responsibility assignment matrix for patch management covering vulnerability scanning, patch testing, deployment scheduling, emergency patching, exception handling, and compliance reporting."
source: "NIST SP 800-40r4, CIS Control 7"
tags: "raci, patch-management, vulnerability, remediation, change-management"
metadata:
  roles: "CISO, Vuln Manager, IT Operations, System Owners, Change Manager, Security Analyst"
  deliverables: "Patch schedule, testing results, deployment records, exception log, compliance report"
content: |
  ## RACI Matrix: Patch Management

  | Activity | CISO | Vuln Mgr | IT Ops | System Owner | Change Mgr | Sec Analyst |
  |----------|------|---------|--------|-------------|-----------|------------|
  | Patch management policy | A | R | C | C | C | C |
  | Vulnerability scanning | I | A | R | I | I | C |
  | Scan result triage | I | A | C | I | I | R |
  | Patch prioritization | A | R | C | C | I | R |
  | Patch testing | I | I | R | C | I | I |
  | Deployment scheduling | I | C | R | C | A | I |
  | Standard patch deployment | I | I | R | I | A | I |
  | Emergency patch deployment | A | R | R | C | R | R |
  | Post-patch validation | I | C | R | R | I | I |
  | Exception requests | C | A | C | R | C | R |
  | Exception approval | A | R | I | I | I | C |
  | Compliance reporting | A | R | C | I | I | C |
  | SLA monitoring | I | R | C | I | I | I |
  | Failed patch remediation | I | A | R | C | C | C |

  ### Notes
  - Change Manager controls the deployment schedule via change management process
  - Emergency patches bypass normal change windows but require post-hoc change record
  - System Owners must validate application functionality after patching
  - CISO approves exceptions for patches that cannot meet SLA

