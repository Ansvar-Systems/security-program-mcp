id: raci-security-awareness
type: raci_template
category: security-operations
title: "RACI Matrix -- Security Awareness Training Program"
summary: "Responsibility assignment matrix for building and operating a security awareness program covering content development, delivery, phishing simulations, metrics tracking, and program improvement."
source: "NIST SP 800-50, ISO 27001:2022 A.6.3, NIS2 Article 21(2)(g)"
tags: "raci, security-awareness, training, phishing-simulation, culture"
metadata:
  roles: "CISO, Awareness Lead, HR, IT Operations, Department Managers, Legal, Communications"
  deliverables: "Training content, phishing simulation results, completion reports, program metrics"
content: |
  ## RACI Matrix: Security Awareness Training

  | Activity | CISO | Awareness Lead | HR | IT Ops | Dept Managers | Legal | Comms |
  |----------|------|---------------|------|--------|-------------|-------|-------|
  | Program strategy and budget | A | R | C | I | I | I | I |
  | Training content development | C | R | C | C | I | C | C |
  | Regulatory training requirements | C | R | C | I | I | A | I |
  | Training platform setup | I | A | C | R | I | I | I |
  | Training assignment and scheduling | I | A | R | I | R | I | I |
  | Training delivery (live sessions) | I | R | C | I | C | I | I |
  | Completion tracking | I | R | R | I | C | I | I |
  | Non-completion escalation | I | C | R | I | A | I | I |
  | Phishing simulation design | C | R | I | C | I | C | I |
  | Phishing simulation execution | I | R | I | C | I | I | I |
  | Phishing results analysis | I | R | I | I | I | I | I |
  | Repeat clicker remediation | I | R | C | I | R | I | I |
  | New hire onboarding training | I | R | A | I | I | I | I |
  | Specialized role-based training | C | R | C | C | C | I | I |
  | Program metrics and reporting | A | R | C | I | I | I | I |
  | Annual program review | A | R | C | I | C | C | I |
  | Internal communications | I | R | C | I | I | I | A |

  ### Notes
  - Department Managers are accountable for their team's completion -- escalation goes through management chain
  - HR owns the new hire training assignment as part of onboarding
  - Legal reviews content for regulatory accuracy (NIS2, DORA, GDPR training requirements)
  - Communications helps with messaging to make awareness engaging rather than punitive

