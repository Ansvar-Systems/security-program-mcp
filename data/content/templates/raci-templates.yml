id: raci-incident-response
type: raci_template
category: security-operations
title: "RACI Matrix -- Incident Response Setup"
summary: "Responsibility assignment matrix for establishing an incident response capability, covering detection, triage, containment, forensics, communication, and recovery activities."
source: "NIST SP 800-61r3, SANS Incident Handler's Handbook"
tags: "raci, incident-response, roles, responsibilities, csirt"
metadata:
  roles: "CISO, IR Manager, SOC Analyst, Forensic Analyst, IT Operations, Legal, HR, Communications, Business Unit Lead"
  deliverables: "IR policy, playbooks, communication plan, exercise schedule"
content: |
  ## RACI Matrix: Incident Response Program

  **R** = Responsible (does the work) | **A** = Accountable (approves/owns) | **C** = Consulted | **I** = Informed

  | Activity | CISO | IR Manager | SOC Analyst | Forensic Analyst | IT Ops | Legal | HR | Comms | BU Lead |
  |----------|------|-----------|-------------|-----------------|--------|-------|------|-------|---------|
  | IR policy approval | A | R | I | I | I | C | C | I | I |
  | Team formation | A | R | I | I | C | I | C | I | I |
  | Playbook development | C | A | R | R | C | C | I | I | I |
  | Detection rule deployment | I | A | R | C | R | I | I | I | I |
  | Alert triage | I | A | R | C | I | I | I | I | I |
  | Incident classification | I | A | R | C | I | I | I | I | I |
  | Containment execution | A | R | C | C | R | I | I | I | I |
  | Evidence collection | I | A | C | R | C | C | I | I | I |
  | Forensic analysis | I | A | I | R | C | C | I | I | I |
  | Eradication | I | A | C | C | R | I | I | I | I |
  | Recovery | I | A | I | I | R | I | I | I | C |
  | Internal communication | A | R | I | I | I | C | C | R | I |
  | External communication | A | C | I | I | I | R | I | R | I |
  | Regulatory notification | A | C | I | I | I | R | I | I | I |
  | Customer notification | A | C | I | I | I | R | I | R | C |
  | Post-incident review | A | R | R | R | C | C | C | I | C |
  | Tabletop exercises | A | R | R | R | R | C | C | C | C |
  | Metrics reporting | A | R | C | I | I | I | I | I | I |
  | HR actions (insider threat) | C | C | I | C | I | R | A | I | C |

  ### Notes
  - IR Manager has day-to-day accountability for response operations; CISO retains ultimate accountability for the program
  - Legal must be consulted before any external communication about incidents
  - HR leads when incidents involve employee misconduct
  - Business Unit Leads are consulted for impact assessment and recovery prioritization
  - Forensic Analyst role can be filled by external retainer if not staffed internally

