source: "ISO 27001:2022 A.5.12-A.5.14, NIST SP 800-60"
tags: "raci, data-classification, labeling, dlp, data-handling, information-protection"
metadata:
  roles: "CISO, Data Protection Lead, DPO, Data Owners, IT Operations, Security Engineer, Auditor"
  deliverables: "Classification policy, labeling scheme, handling procedures, DLP rules, training materials"
content: |
  ## RACI Matrix: Data Classification Program

  | Activity | CISO | DP Lead | DPO | Data Owner | IT Ops | Sec Engineer | Auditor |
  |----------|------|--------|------|-----------|--------|-------------|---------|
  | Classification policy | A | R | C | C | I | I | I |
  | Classification scheme design | A | R | C | C | C | C | I |
  | Data inventory | I | A | C | R | C | I | I |
  | Classification assignment | I | C | C | A | I | I | I |
  | Labeling tool deployment | I | A | I | I | R | R | I |
  | Handling procedures | A | R | C | C | C | C | I |
  | DLP policy design | C | A | C | C | I | R | I |
  | DLP deployment | I | A | I | I | R | R | I |
  | DLP alert review | I | A | I | C | I | R | I |
  | User training | I | R | C | C | I | I | I |
  | Classification review | I | A | C | R | I | I | C |
  | Compliance audit | I | C | C | C | I | I | A |
  | Exception handling | A | R | C | R | I | I | I |

  ### Notes
  - Data Owners (typically business unit leads) are accountable for classifying their data
  - DPO consulted for personal data classification to ensure GDPR alignment
  - Security Engineer handles technical deployment of labeling and DLP tools
  - Annual classification review ensures labels remain accurate as data usage changes

