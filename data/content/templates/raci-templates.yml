id: raci-business-continuity
type: raci_template
category: risk-management
title: "RACI Matrix -- Business Continuity Planning"
summary: "Responsibility assignment matrix for business continuity planning covering BIA, recovery strategy, plan development, testing, and maintenance."
source: "ISO 22301:2019, NIST SP 800-34r1"
tags: "raci, business-continuity, bcp, disaster-recovery, bcp-testing, bia"
metadata:
  roles: "CEO/MD, CISO, BC Manager, IT Operations, Business Unit Leads, Facilities, HR, Communications"
  deliverables: "BIA report, recovery strategies, BC plan, test results, maintenance schedule"
content: |
  ## RACI Matrix: Business Continuity Planning

  | Activity | CEO/MD | CISO | BC Mgr | IT Ops | BU Leads | Facilities | HR | Comms |
  |----------|--------|------|--------|--------|---------|-----------|------|-------|
  | BC policy approval | A | C | R | I | I | I | I | I |
  | Business impact analysis | C | C | A | C | R | C | C | I |
  | RTO/RPO definition | A | C | R | C | R | I | I | I |
  | Recovery strategy selection | A | C | R | R | C | C | I | I |
  | BC plan development | I | C | A | R | R | R | R | R |
  | IT disaster recovery plan | I | A | C | R | C | C | I | I |
  | Crisis management plan | A | C | R | C | C | C | C | R |
  | Crisis communication plan | A | I | C | I | I | I | I | R |
  | Annual BC test | A | C | R | R | R | R | C | C |
  | Test results review | A | C | R | C | C | I | I | I |
  | Plan maintenance (annual) | I | C | A | R | R | R | C | C |
  | Alternate site management | I | I | A | R | I | R | I | I |
  | Staff relocation planning | I | I | C | I | C | C | A | I |

  ### Notes
  - CEO/MD ultimately accountable for business continuity -- it is a business decision, not an IT decision
  - Business Unit Leads define critical processes and acceptable downtime for their units
  - BC Manager coordinates and maintains plans; does not own business process recovery
  - IT Operations owns the technical disaster recovery component
  - Annual testing is a minimum; critical organizations should test semi-annually
