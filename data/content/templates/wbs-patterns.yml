id: wbs-pentest-program
type: wbs_pattern
category: security-operations
title: "WBS Pattern -- Penetration Testing Program"
summary: "Work breakdown structure for establishing a recurring penetration testing program covering scope definition, vendor selection, test execution, remediation tracking, and program maturity."
source: "PTES, OWASP Testing Guide, CREST standards"
tags: "wbs, pentest, penetration-testing, red-team, vulnerability, offensive-security"
metadata:
  deliverables: "Pentest policy, scope documents, vendor contract, test reports, remediation tracker"
  phases: "5 work packages, 24 tasks"
content: |
  ## WBS: Penetration Testing Program

  ### 1.0 Program Design
  - 1.1 Define pentest policy (scope, frequency, types, rules of engagement)
  - 1.2 Identify target systems and applications by risk tier
  - 1.3 Define test types: external network, internal network, web application, mobile, API, cloud, social engineering
  - 1.4 Set testing frequency by asset tier (Tier 1: semi-annual, Tier 2: annual, Tier 3: bi-annual)
  - 1.5 Define annual testing calendar

  ### 2.0 Vendor Management
  - 2.1 Define vendor qualification criteria (certifications: OSCP, CREST, GPEN; insurance; references)
  - 2.2 Issue RFP or solicit proposals
  - 2.3 Evaluate proposals and select vendor(s)
  - 2.4 Negotiate master services agreement (MSA) with security testing addendum
  - 2.5 Establish communication channels and points of contact

  ### 3.0 Test Execution (per engagement)
  - 3.1 Define scope of work and rules of engagement
  - 3.2 Sign engagement letter and obtain authorization
  - 3.3 Share target information (scope, credentials for authenticated testing, emergency contacts)
  - 3.4 Execute testing
  - 3.5 Conduct debrief session with testing team
  - 3.6 Receive and review final report

  ### 4.0 Remediation
  - 4.1 Triage findings by severity (Critical, High, Medium, Low, Informational)
  - 4.2 Assign remediation owners and SLAs
  - 4.3 Track remediation progress
  - 4.4 Request retest of critical and high findings
  - 4.5 Document accepted risks for findings not remediated

  ### 5.0 Program Maturity
  - 5.1 Track year-over-year finding trends
  - 5.2 Report program metrics to management (finding counts, remediation rates, recurring issues)
  - 5.3 Adjust scope and frequency based on findings and threat landscape
  - 5.4 Consider adding red team exercises (adversary simulation) for mature programs
  - 5.5 Evaluate bug bounty program as complement to periodic testing

  ### Dependencies
  - 2.0 depends on 1.0 (policy drives vendor requirements)
  - 3.0 depends on 2.0 (vendor selected before testing)
  - 4.0 depends on 3.0 (findings drive remediation)
  - 5.0 is ongoing after first test cycle

