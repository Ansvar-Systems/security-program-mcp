---
id: wbs-compliance-program
type: wbs_pattern
category: compliance
title: "WBS Pattern -- Compliance Program Build"
summary: "Work breakdown structure for building a compliance program from scratch, covering framework selection, gap analysis, control implementation, evidence management, and audit preparation."
source: "ISACA COBIT, ISO 27001, SOC 2 preparation best practices"
tags: "wbs, compliance, program-management, audit, evidence, controls"
metadata:
  deliverables: "Framework mapping, gap analysis, control matrix, evidence repository, audit-ready package"
  phases: "5 work packages, 28 tasks"
content: |
  ## WBS: Compliance Program Build

  ### 1.0 Program Setup
  - 1.1 Define compliance objectives and drivers (regulatory, contractual, strategic)
  - 1.2 Select target framework(s) (ISO 27001, SOC 2, NIS2, DORA, etc.)
  - 1.3 Define program scope and boundaries
  - 1.4 Secure executive sponsorship and budget
  - 1.5 Assign program manager and core team
  - 1.6 Select GRC tool or evidence management platform

  ### 2.0 Assessment
  - 2.1 Map framework requirements to a control matrix
  - 2.2 Inventory existing controls and policies
  - 2.3 Conduct gap analysis (control matrix vs. current state)
  - 2.4 Classify gaps by severity and effort
  - 2.5 Create remediation roadmap with priorities
  - 2.6 Define success criteria and KPIs

  ### 3.0 Control Implementation
  - 3.1 Draft and approve required policies
  - 3.2 Implement technical controls (access management, logging, encryption, etc.)
  - 3.3 Implement operational controls (change management, incident response, etc.)
  - 3.4 Implement administrative controls (training, background checks, reviews)
  - 3.5 Configure automated evidence collection
  - 3.6 Document control descriptions, owners, and frequencies

  ### 4.0 Evidence and Documentation
  - 4.1 Establish evidence collection calendar
  - 4.2 Collect initial evidence for all controls
  - 4.3 Verify evidence quality (timestamps, completeness, relevance)
  - 4.4 Organize evidence repository by control ID
  - 4.5 Conduct internal readiness review

  ### 5.0 Audit Preparation
  - 5.1 Select external auditor (if certification/attestation required)
  - 5.2 Prepare system description or scope statement
  - 5.3 Conduct pre-audit walkthrough
  - 5.4 Address pre-audit findings
  - 5.5 Support audit execution
  - 5.6 Remediate audit findings and document management responses

  ### Dependencies
  - 2.0 depends on 1.0 completion
  - 3.0 depends on 2.0 (gap analysis drives implementation priorities)
  - 4.0 runs in parallel with 3.0 (collect evidence as controls are implemented)
  - 5.0 depends on 3.0 and 4.0

