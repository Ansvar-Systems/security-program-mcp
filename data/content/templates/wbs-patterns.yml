id: wbs-security-architecture-review
type: wbs_pattern
category: architecture
title: "WBS Pattern -- Security Architecture Review"
summary: "Work breakdown structure for conducting a security architecture review of an application or infrastructure, covering threat modeling, control assessment, design review, and recommendations."
source: "SABSA, TOGAF Security Architecture, OWASP, STRIDE"
tags: "wbs, architecture-review, threat-modeling, design-review, controls"
metadata:
  deliverables: "Architecture diagrams, threat model, control assessment, findings report, recommendations"
  phases: "4 work packages, 20 tasks"
content: |
  ## WBS: Security Architecture Review

  ### 1.0 Scoping and Information Gathering
  - 1.1 Define review scope (system, application, or infrastructure boundaries)
  - 1.2 Collect architecture diagrams (network, data flow, deployment, component)
  - 1.3 Identify data classifications and sensitivity levels
  - 1.4 Document trust boundaries and authentication/authorization mechanisms
  - 1.5 Inventory third-party integrations and dependencies

  ### 2.0 Threat Modeling
  - 2.1 Create or update data flow diagrams (DFDs) at appropriate granularity
  - 2.2 Identify trust boundaries in data flow diagrams
  - 2.3 Apply STRIDE methodology per element and data flow
  - 2.4 Enumerate threats with attack scenarios
  - 2.5 Assess likelihood and impact for each threat
  - 2.6 Map threats to existing mitigations

  ### 3.0 Control Assessment
  - 3.1 Review authentication and authorization architecture
  - 3.2 Review encryption (in transit, at rest, key management)
  - 3.3 Review network segmentation and firewall rules
  - 3.4 Review logging and monitoring coverage
  - 3.5 Review input validation and output encoding
  - 3.6 Review error handling and information disclosure
  - 3.7 Review secrets management
  - 3.8 Review deployment pipeline security

  ### 4.0 Reporting and Recommendations
  - 4.1 Document findings with severity ratings
  - 4.2 Provide specific, actionable recommendations for each finding
  - 4.3 Prioritize recommendations by risk and implementation effort
  - 4.4 Present findings to development/architecture team
  - 4.5 Create remediation tracking items

  ### Dependencies
  - 2.0 and 3.0 depend on 1.0 (need architecture understanding before analysis)
  - 2.0 and 3.0 can run in parallel
  - 4.0 depends on 2.0 and 3.0

