id: wbs-soc-build
type: wbs_pattern
category: security-operations
title: "WBS Pattern -- Security Operations Center Build"
summary: "Work breakdown structure for building a Security Operations Center covering people, process, and technology workstreams from planning through operational readiness."
source: "SANS SOC model, MITRE ATT&CK, NIST SP 800-61r3"
tags: "wbs, soc, siem, detection, monitoring, operations"
metadata:
  deliverables: "SOC charter, SIEM deployment, detection rules, runbooks, shift schedule, metrics dashboard"
  phases: "6 work packages, 32 tasks"
content: |
  ## WBS: SOC Build

  ### 1.0 Planning and Design
  - 1.1 Define SOC mission, scope, and service catalog
  - 1.2 Select SOC model (internal, hybrid, MSSP)
  - 1.3 Define operating hours (business hours, extended, 24x7)
  - 1.4 Design SOC organizational structure and reporting lines
  - 1.5 Develop SOC charter
  - 1.6 Define budget and timeline

  ### 2.0 People
  - 2.1 Define roles and job descriptions (L1, L2, L3, Detection Engineer, SOC Manager)
  - 2.2 Recruit or assign analysts
  - 2.3 Create shift schedule aligned to operating hours
  - 2.4 Design training program (SIEM, detection, investigation, forensics)
  - 2.5 Deliver initial training
  - 2.6 Define career progression path

  ### 3.0 Technology
  - 3.1 Select and deploy SIEM platform
  - 3.2 Identify and onboard critical log sources (priority: authentication, firewall, endpoint, email, cloud)
  - 3.3 Configure log parsing and normalization
  - 3.4 Deploy endpoint detection and response (EDR) solution
  - 3.5 Deploy ticketing / case management system
  - 3.6 Configure threat intelligence feeds
  - 3.7 Deploy SOAR platform (optional, Phase 2)

  ### 4.0 Detection Content
  - 4.1 Deploy baseline detection rules (vendor-supplied)
  - 4.2 Develop custom detection rules for organization-specific threats
  - 4.3 Map detection coverage to MITRE ATT&CK framework
  - 4.4 Tune rules to reduce false positives to manageable rate
  - 4.5 Establish detection rule lifecycle (creation, testing, deployment, review, retirement)

  ### 5.0 Processes
  - 5.1 Create alert triage runbook (classification, priority, response actions)
  - 5.2 Create incident escalation procedures
  - 5.3 Create investigation runbooks for top threat categories
  - 5.4 Define handoff procedures between shifts
  - 5.5 Define metrics collection and reporting process
  - 5.6 Create SOC-to-IR escalation workflow

  ### 6.0 Validation and Go-Live
  - 6.1 Conduct purple team exercise to test detection and response
  - 6.2 Run operational readiness review
  - 6.3 Begin shadow operations (analysts process alerts alongside existing processes)
  - 6.4 Transition to live operations
  - 6.5 Conduct 30-day post-go-live review

  ### Dependencies
  - 2.0 and 3.0 can run in parallel after 1.0
  - 4.0 depends on 3.0 (SIEM must be deployed before detection content)
  - 5.0 depends on 2.0 (processes align to team structure)
  - 6.0 depends on 2.0, 3.0, 4.0, and 5.0

