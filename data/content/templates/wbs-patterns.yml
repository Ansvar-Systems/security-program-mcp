id: wbs-isms-implementation
type: wbs_pattern
category: compliance
title: "WBS Pattern -- ISMS Implementation (ISO 27001)"
summary: "Work breakdown structure for implementing an Information Security Management System per ISO 27001:2022, covering all clauses from context to continual improvement."
source: "ISO 27001:2022, ISO 27003 implementation guidance"
tags: "wbs, isms, iso27001, management-system, certification"
metadata:
  deliverables: "ISMS documentation set, risk register, SoA, internal audit report, management review minutes"
  phases: "7 work packages, 35 tasks"
content: |
  ## WBS: ISMS Implementation

  ### 1.0 Context and Leadership (Clause 4-5)
  - 1.1 Define organizational context (internal and external issues)
  - 1.2 Identify interested parties and requirements
  - 1.3 Define ISMS scope
  - 1.4 Obtain management commitment
  - 1.5 Define information security policy
  - 1.6 Assign ISMS roles and responsibilities

  ### 2.0 Planning (Clause 6)
  - 2.1 Identify risks and opportunities
  - 2.2 Define risk assessment methodology
  - 2.3 Conduct risk assessment
  - 2.4 Define risk treatment plan
  - 2.5 Create Statement of Applicability
  - 2.6 Set information security objectives

  ### 3.0 Support (Clause 7)
  - 3.1 Determine resource requirements
  - 3.2 Define competence requirements and gaps
  - 3.3 Design awareness program
  - 3.4 Establish internal and external communication procedures
  - 3.5 Create document control procedure

  ### 4.0 Operation (Clause 8)
  - 4.1 Implement risk treatment plan
  - 4.2 Implement Annex A controls per SoA
  - 4.3 Develop operational procedures
  - 4.4 Manage outsourced processes
  - 4.5 Maintain operational documentation

  ### 5.0 Performance Evaluation (Clause 9)
  - 5.1 Define monitoring and measurement approach
  - 5.2 Plan and conduct internal audit
  - 5.3 Address audit findings
  - 5.4 Prepare management review input
  - 5.5 Conduct management review

  ### 6.0 Improvement (Clause 10)
  - 6.1 Manage non-conformities and corrective actions
  - 6.2 Identify improvement opportunities
  - 6.3 Implement improvements

  ### 7.0 Certification (if applicable)
  - 7.1 Select certification body
  - 7.2 Prepare for Stage 1 audit
  - 7.3 Address Stage 1 findings
  - 7.4 Prepare for Stage 2 audit
  - 7.5 Address Stage 2 findings and obtain certificate

  ### Dependencies
  - Sequential: 1.0 -> 2.0 -> 3.0/4.0 (parallel) -> 5.0 -> 6.0 -> 7.0

---
id: wbs-cloud-security-program
type: wbs_pattern
category: architecture
title: "WBS Pattern -- Cloud Security Program"
summary: "Work breakdown structure for establishing a cloud security program covering strategy, identity, network, data, workload, and operations security across IaaS, PaaS, and SaaS."
source: "CSA Cloud Controls Matrix, CIS Cloud Benchmarks, AWS/Azure/GCP well-architected frameworks"
tags: "wbs, cloud-security, iaas, paas, saas, shared-responsibility, cspm"
metadata:
  deliverables: "Cloud security policy, shared responsibility matrix, CSPM deployment, cloud architecture standards"
  phases: "5 work packages, 26 tasks"
content: |
  ## WBS: Cloud Security Program

  ### 1.0 Strategy and Governance
  - 1.1 Define cloud security policy and acceptable use
  - 1.2 Document shared responsibility model per cloud provider
  - 1.3 Classify cloud workloads by data sensitivity (which data can go where)
  - 1.4 Define cloud architecture standards and guardrails
  - 1.5 Establish cloud security team roles and responsibilities

  ### 2.0 Identity and Access
  - 2.1 Federate cloud identity with corporate IdP (SSO)
  - 2.2 Implement least-privilege IAM policies
  - 2.3 Deploy cloud-native MFA for privileged operations
  - 2.4 Implement service account and machine identity management
  - 2.5 Enable cloud IAM logging and alerting

  ### 3.0 Network Security
  - 3.1 Design cloud network architecture (VPCs, subnets, security groups)
  - 3.2 Implement network segmentation and microsegmentation
  - 3.3 Deploy web application firewall (WAF) for public endpoints
  - 3.4 Configure DDoS protection
  - 3.5 Implement private connectivity for hybrid environments (VPN, Direct Connect, ExpressRoute)

  ### 4.0 Data and Workload Security
  - 4.1 Enable encryption at rest (default) with customer-managed keys for sensitive data
  - 4.2 Enable encryption in transit (enforce TLS)
  - 4.3 Deploy Cloud Security Posture Management (CSPM) tool
  - 4.4 Implement container security (image scanning, runtime protection, admission control)
  - 4.5 Configure cloud backup and disaster recovery
  - 4.6 Implement secrets management (cloud vault or external)

  ### 5.0 Operations and Monitoring
  - 5.1 Enable cloud audit logging for all services
  - 5.2 Forward cloud logs to SIEM
  - 5.3 Deploy cloud-native threat detection (GuardDuty, Defender, SCC)
  - 5.4 Implement automated compliance checking (cloud config rules)
  - 5.5 Establish cloud incident response procedures
  - 5.6 Define cloud cost monitoring (detect cryptomining, resource abuse)

  ### Dependencies
  - 1.0 first (strategy drives all other work packages)
  - 2.0, 3.0, and 4.0 can run in parallel after 1.0
  - 5.0 depends on 3.0 and 4.0 (need workloads and network before monitoring)
