title: "NIS2 Directive Implementation Playbook"
summary: "6-phase, 12-month implementation plan for NIS2 Directive compliance covering gap analysis, governance setup, Article 21 controls, incident reporting, supply chain security, and certification readiness."
source: "ENISA NIS2 Implementation Guidance, Directive (EU) 2022/2555"
tags: "nis2, eu, compliance, directive, enisa, incident-reporting, supply-chain"
metadata:
  duration: "12 months"
  phases: "6"
  target_org_size: "Medium to large (50+ employees or essential/important entity)"
  frameworks: "NIS2, ISO 27001, ENISA guidelines"
content: |
  ## Phase 1: Scoping and Gap Analysis (Months 1-2)

  ### Objective
  Determine whether the organization falls under NIS2 scope, classify as essential or important entity, and identify gaps against Article 21 requirements.

  ### Activities

  **1.1 Entity Classification**
  - Map the organization against NIS2 Annex I (essential entities: energy, transport, banking, health, water, digital infrastructure, ICT service management, public administration, space) and Annex II (important entities: postal services, waste management, chemicals, food, manufacturing, digital providers, research)
  - Determine if size thresholds apply (>50 employees or >EUR 10M turnover for most sectors)
  - Document classification rationale for the competent authority

  **1.2 Gap Analysis Against Article 21**
  - Assess current state against all 10 Article 21 security measures:
    1. Risk analysis and information system security policies
    2. Incident handling
    3. Business continuity and crisis management
    4. Supply chain security
    5. Security in network and information system acquisition, development, and maintenance
    6. Policies and procedures to assess the effectiveness of cybersecurity risk management measures
    7. Basic cyber hygiene practices and cybersecurity training
    8. Policies and procedures for the use of cryptography
    9. Human resources security, access control policies, and asset management
    10. Use of multi-factor authentication, secured communications, and secured emergency communications
  - Score each measure: Not Started / Partial / Substantially Compliant / Fully Compliant

  **1.3 National Transposition Review**
  - Identify the member state's transposition law (deadline was October 17, 2024)
  - Note any national additions or stricter requirements beyond the directive
  - Identify the designated competent authority and its registration requirements

  ### Deliverables
  - Entity classification document
  - Gap analysis report (10 measures, scored)
  - National requirements summary
  - Remediation priority matrix

  ### Decision Gate
  Executive sponsor approves scope, classification, and remediation budget before proceeding.

  ---

  ## Phase 2: Governance and Policy Framework (Months 2-4)

  ### Objective
  Establish the governance structure and policy framework required by NIS2 Article 20 (management body accountability).

  ### Activities

  **2.1 Management Body Accountability**
  - Brief the management body on NIS2 obligations (Article 20 requires management bodies to approve and oversee cybersecurity risk management measures)
  - Define management body training requirements
  - Establish personal liability awareness (Article 20(2))
  - Schedule recurring management body cybersecurity reviews

  **2.2 Policy Development**
  - Create or update information security policy aligned to Article 21 measures
  - Develop incident response policy meeting NIS2 Article 23 notification timelines (24h early warning, 72h incident notification, 1 month final report)
  - Create supply chain security policy
  - Develop business continuity and crisis management policy
  - Create cryptography use policy
  - Develop access control and authentication policy

  **2.3 Risk Management Framework**
  - Select or adapt a risk assessment methodology (ISO 27005, NIST 800-30, FAIR)
  - Define risk appetite and acceptance criteria
  - Conduct initial risk assessment covering all 10 Article 21 domains
  - Create risk treatment plan

  ### Deliverables
  - Management body training records
  - Complete policy set (6+ policies)
  - Risk management framework document
  - Risk register with treatment plan

  ---

  ## Phase 3: Technical Controls Implementation (Months 4-8)

  ### Objective
  Implement technical controls to address gaps identified in Phase 1, covering all Article 21 security measures.

  ### Activities

  **3.1 Incident Handling (Article 21(2)(b))**
  - Deploy SIEM or log management platform
  - Implement incident detection rules for critical asset categories
  - Build incident response playbooks for top 5 threat scenarios
  - Test notification workflow against Article 23 timelines
  - Establish communication channel with national CSIRT

  **3.2 Business Continuity (Article 21(2)(c))**
  - Conduct business impact analysis for critical services
  - Define recovery time objectives (RTO) and recovery point objectives (RPO)
  - Implement backup and recovery procedures
  - Create crisis management procedures and communication plan
  - Test backup restoration quarterly

  **3.3 Supply Chain Security (Article 21(2)(d))**
  - Inventory all ICT suppliers and service providers
  - Classify suppliers by criticality (access to systems, data processing, service dependency)
  - Assess top-tier supplier security posture
  - Include security requirements in procurement contracts
  - Establish supplier incident notification requirements

  **3.4 Network and System Security (Article 21(2)(e))**
  - Implement vulnerability management program (scan, prioritize, patch)
  - Deploy network segmentation for critical systems
  - Implement secure development lifecycle for in-house software
  - Conduct security testing (penetration testing, code review) annually

  **3.5 Authentication and Encryption (Article 21(2)(i-j))**
  - Deploy multi-factor authentication for all privileged access
  - Implement MFA for remote access and critical systems
  - Deploy TLS 1.2+ on all external-facing services
  - Implement encryption at rest for sensitive data stores
  - Establish secured emergency communication channels

  ### Deliverables
  - Incident response capability (SIEM + playbooks + CSIRT contact)
  - Business continuity plan with tested backups
  - Supplier security assessment results
  - Vulnerability management reports
  - MFA deployment records
  - Encryption implementation records

  ---

  ## Phase 4: Training and Awareness (Months 6-9)

  ### Objective
  Meet Article 21(2)(g) cyber hygiene and training requirements for all staff and management.

  ### Activities

  **4.1 Management Body Training**
  - Deliver NIS2-specific training to all management body members
  - Cover: NIS2 obligations, personal liability, risk management oversight, incident reporting duties
  - Document attendance and comprehension assessment

  **4.2 Staff Awareness Program**
  - Deploy organization-wide cybersecurity awareness training
  - Cover: phishing recognition, password hygiene, incident reporting procedures, acceptable use
  - Conduct phishing simulations quarterly
  - Track completion rates (target: 95%+)

  **4.3 Specialized Training**
  - Train incident response team on NIS2 notification procedures
  - Train IT/security staff on new tools and procedures
  - Train procurement staff on supply chain security requirements

  ### Deliverables
  - Management body training records with dates
  - Staff training completion report
  - Phishing simulation results
  - Specialized training records

  ---

  ## Phase 5: Testing and Measurement (Months 9-11)

  ### Objective
  Meet Article 21(2)(f) requirement to assess the effectiveness of cybersecurity risk management measures.

  ### Activities

  **5.1 Effectiveness Assessment**
  - Conduct internal audit against all 10 Article 21 measures
  - Run tabletop exercise for incident response (test Article 23 notification timelines)
  - Execute business continuity test
  - Conduct penetration test of critical systems
  - Review and test supply chain security controls

  **5.2 Metrics and Reporting**
  - Define KPIs for each Article 21 measure
  - Build management reporting dashboard
  - Report results to management body
  - Document non-conformities and corrective actions

  **5.3 Remediation**
  - Address findings from internal audit
  - Fix vulnerabilities from penetration test
  - Update policies and procedures based on lessons learned

  ### Deliverables
  - Internal audit report
  - Tabletop exercise report
  - Penetration test report
  - KPI dashboard
  - Corrective action plan

  ---

  ## Phase 6: Registration and Ongoing Compliance (Months 11-12)

  ### Objective
  Complete registration with the competent authority and establish ongoing compliance operations.

  ### Activities

  **6.1 Registration**
  - Register with the national competent authority per national transposition requirements
  - Provide required information: entity name, sector, contact details, IP ranges, member states of operation
  - DNS registries and TLD registrars: provide additional domain registration data

  **6.2 Ongoing Operations**
  - Establish annual risk assessment cycle
  - Schedule recurring management body reviews (quarterly minimum)
  - Maintain incident response readiness (test notification workflow semi-annually)
  - Continue supplier assessments (annual review cycle)
  - Maintain training program (annual refresh + new hire onboarding)
  - Prepare for potential audits or inspections by competent authority

  **6.3 Continuous Improvement**
  - Track regulatory updates and guidance from competent authority
  - Monitor ENISA publications for updated guidance
  - Review and update policies annually
  - Incorporate lessons from real incidents

  ### Deliverables
  - Registration confirmation
  - Annual compliance calendar
  - Continuous improvement plan

  ---

  ## Staffing Guidance

  | Role | FTE (12-month program) | Notes |
  |------|----------------------|-------|
  | Program Manager | 0.5-1.0 | Dedicated during active implementation |
  | CISO / Security Lead | 0.3-0.5 | Oversight and management body liaison |
  | Security Engineer | 1.0-2.0 | Technical controls implementation |
  | GRC Analyst | 0.5-1.0 | Policy, risk, audit |
  | Legal / Compliance | 0.2 | National transposition review, contracts |
  | Training Coordinator | 0.2 | Awareness program delivery |
  | External Consultants | As needed | Penetration testing, specialized assessments |

  ## Budget Indicators

  | Organization Size | Estimated Budget Range | Notes |
  |-------------------|----------------------|-------|
  | 50-250 employees | EUR 150K-400K | Depends on current maturity |
  | 250-1000 employees | EUR 300K-800K | Multiple sites increase cost |
  | 1000+ employees | EUR 500K-2M+ | Complex supply chains add scope |

  Costs include tooling, consulting, training, and internal staff time. Organizations with existing ISO 27001 certification will be at the lower end.
