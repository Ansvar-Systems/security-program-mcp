id: charter-compliance-program
type: program_charter
category: compliance
title: "Program Charter -- Multi-Framework Compliance Program"
summary: "Program charter for managing compliance across multiple frameworks (ISO 27001, SOC 2, NIS2) with shared controls, unified evidence management, and coordinated audit schedule."
source: "ISACA compliance management, UCF (Unified Compliance Framework)"
tags: "charter, compliance, multi-framework, unified-controls, evidence"
metadata:
  sponsor_role: "CISO or VP Legal"
  duration: "12-18 months"
content: |
  ## Program Charter: Multi-Framework Compliance

  ### 1. Purpose
  Establish a unified compliance program that satisfies multiple framework requirements (ISO 27001, SOC 2, NIS2, and future frameworks) through shared controls, avoiding duplicate effort and audit fatigue.

  ### 2. Problem Statement
  Organizations increasingly face requirements from multiple frameworks. Treating each as a separate program results in: duplicate controls, overlapping audits, conflicting policies, and unsustainable evidence collection burden.

  ### 3. Approach: Unified Control Framework
  - Map all framework requirements to a single internal control set
  - Each control satisfies requirements from one or more frameworks
  - Evidence collected once, used for multiple audits
  - Single control owner per control, regardless of how many frameworks reference it

  ### 4. Framework Mapping Strategy
  | Internal Control Domain | ISO 27001 | SOC 2 | NIS2 |
  |------------------------|-----------|-------|------|
  | Access Management | A.5.15-A.5.18, A.8.2-A.8.5 | CC6 | Art.21(2)(i) |
  | Change Management | A.8.9, A.8.25-A.8.33 | CC8 | Art.21(2)(e) |
  | Incident Management | A.5.24-A.5.28 | CC7 | Art.21(2)(b) |
  | Risk Management | Clause 6.1, A.5.7 | CC3, CC9 | Art.21(2)(a) |
  | Business Continuity | A.5.29-A.5.30 | Availability | Art.21(2)(c) |
  | Vendor Management | A.5.19-A.5.23 | CC9 | Art.21(2)(d) |
  | Training | A.6.3 | CC1 | Art.21(2)(g) |
  | Cryptography | A.8.24 | CC6 | Art.21(2)(h) |
  | Monitoring | A.8.15-A.8.16 | CC4, CC7 | Art.21(2)(f) |

  ### 5. Success Criteria
  - All target frameworks satisfied from a single control set
  - <20% additional effort per new framework added
  - Single evidence repository serves all audits
  - Audit preparation time reduced by 40% vs. separate programs
  - No conflicting policies

  ### 6. Key Milestones
  | Milestone | Target |
  |-----------|--------|
  | Unified control mapping complete | Month 3 |
  | GRC tool deployed | Month 4 |
  | Shared evidence collection operational | Month 6 |
  | First framework certification/attestation | Month 9-12 |
  | Second framework certification/attestation | Month 12-15 |
  | Annual renewal cycle established | Month 18 |

