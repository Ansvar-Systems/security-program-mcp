id: change-mgmt-security-controls
type: change_management
category: risk-management
title: "Change Management -- Security Control Implementation"
summary: "Change management strategy for rolling out new security controls (MFA, EDR, DLP) with minimal user disruption, covering stakeholder analysis, communication, training, and resistance management."
source: "ADKAR model, Kotter's 8-step model"
tags: "change-management, controls, adoption, resistance, training, communication"
metadata:
  roles: "Change Lead, Technical Lead, Communications, Department Champions"
  deliverables: "Impact assessment, communication plan, training plan, adoption metrics"
content: |
  ## Change Management: Security Control Rollout

  ### Change Impact Assessment

  Before rolling out any security control that affects end users, assess:

  | Factor | Low Impact | Medium Impact | High Impact |
  |--------|-----------|--------------|-------------|
  | Daily workflow change | No change | Minor adjustment | New steps required |
  | Tool change | Same tools | New tool (familiar type) | New tool (unfamiliar) |
  | Authentication change | No change | Additional factor (MFA) | New credential type |
  | Access change | No change | Some restrictions | Significant restrictions |
  | Performance impact | None | Minor delays | Noticeable slowdown |

  ### ADKAR Framework for Security Changes

  **Awareness:** Why this change is happening
  - Communicate the business reason (regulatory requirement, incident prevention, customer demand)
  - Do not lead with fear -- lead with purpose
  - Use real examples relevant to your industry

  **Desire:** Motivation to support the change
  - Explain benefits to the individual (protection of their data, simpler access long-term)
  - Address "what's in it for me?"
  - Secure management endorsement

  **Knowledge:** How to work with the new control
  - Provide clear, step-by-step instructions
  - Offer multiple learning formats (video, written guide, live demo)
  - Anticipate common questions and create FAQ

  **Ability:** Capability to perform new behaviors
  - Provide hands-on practice before go-live
  - Offer help desk support during transition
  - Allow grace period for adoption (warn before enforcing)

  **Reinforcement:** Sustaining the change
  - Monitor adoption metrics
  - Recognize early adopters
  - Address non-adoption through management chain (not punishment)
  - Collect feedback and adjust

  ### Rollout Strategy for Common Controls

  **MFA Rollout:**
  - Week 1-2: Announce, explain, provide enrollment guides
  - Week 3-4: Voluntary enrollment period with support
  - Week 5-6: Mandatory enrollment (IT-assisted for stragglers)
  - Week 7+: Enforcement enabled (block access without MFA)
  - Grace period: 2 weeks with reminder on each login

  **EDR Deployment:**
  - Silent deployment by IT (no user action required)
  - Communicate what was deployed and why
  - Address privacy concerns proactively ("monitors for threats, not employee behavior")
  - Provide IT contact for performance issues

  **DLP Controls:**
  - Phase 1: Monitor only (collect data, no blocks)
  - Phase 2: Warn (user gets notification, can override with justification)
  - Phase 3: Block (approval required for policy violations)
  - Communicate each phase transition with examples of what triggers alerts

  ### Resistance Management Strategies

  | Resistance Type | Indicator | Response |
  |----------------|-----------|----------|
  | "It slows me down" | Complaints about workflow | Optimize the control, provide shortcuts |
  | "I don't understand why" | Questions, confusion | Improve communication, do town hall |
  | "I don't trust it" | Privacy concerns | Transparent policy, limit data collection |
  | "I can't do it" | Help desk calls | More training, simpler guides |
  | "Rules don't apply to me" | Executive exception requests | Enforce equally, sponsor must support |

