id: charter-iso27001-program
type: program_charter
category: compliance
title: "Program Charter -- ISO 27001 Certification Program"
summary: "Program charter template for an ISO 27001 certification initiative covering purpose, scope, objectives, success criteria, governance, budget, timeline, risks, and sponsor responsibilities."
source: "PMI PMBOK, ISO 27001:2022 Clause 5"
tags: "charter, iso27001, program, certification, sponsorship, objectives"
metadata:
  sponsor_role: "CTO or CISO"
  duration: "9-12 months"
content: |
  ## Program Charter: ISO 27001 Certification

  ### 1. Purpose
  Establish an Information Security Management System (ISMS) per ISO 27001:2022 and achieve third-party certification to meet customer contractual requirements, support sales pipeline, and reduce organizational risk.

  ### 2. Scope
  **In scope:** [Define ISMS boundaries -- e.g., "All IT systems, personnel, and processes supporting the SaaS platform and customer data processing at headquarters and cloud environments"]
  **Out of scope:** [Explicitly exclude -- e.g., "Physical office security at satellite offices, legacy applications scheduled for decommission by Q3"]

  ### 3. Objectives
  - Achieve ISO 27001:2022 certification from an accredited certification body within 12 months
  - Implement risk-based controls across all Annex A themes
  - Pass Stage 2 audit with zero major non-conformities
  - Establish sustainable ISMS operations (ongoing compliance, not one-time project)

  ### 4. Success Criteria
  | Criterion | Measure | Target |
  |-----------|---------|--------|
  | Certification achieved | Certificate issued | Within 12 months |
  | Risk assessment coverage | Assets assessed / Total assets | 100% in scope |
  | Control implementation | Controls implemented / Controls in SoA | 100% |
  | Staff training | Trained / Total in-scope staff | 95%+ |
  | Internal audit | Non-conformities addressed | 100% before Stage 2 |
  | Budget adherence | Actual spend / Budget | Within 110% |

  ### 5. Governance
  - **Executive Sponsor:** [Name], [Title] -- approves scope changes, removes blockers, allocates resources
  - **Program Manager:** [Name] -- day-to-day execution, progress reporting
  - **Steering Committee:** Sponsor + Department Heads -- monthly review
  - Decision authority: Sponsor approves scope changes >10% effort; Program Manager approves within scope

  ### 6. Key Milestones
  | Milestone | Target Date |
  |-----------|------------|
  | Scope approved | Month 1 |
  | Risk assessment complete | Month 3 |
  | SoA approved | Month 4 |
  | Controls implemented | Month 7 |
  | Internal audit complete | Month 8 |
  | Management review complete | Month 8 |
  | Stage 1 audit | Month 9 |
  | Stage 2 audit | Month 10-11 |
  | Certificate received | Month 12 |

  ### 7. Budget
  | Category | Estimate |
  |----------|---------|
  | Internal staff time | [X FTE-months] |
  | GRC tooling | [Amount] |
  | External consulting | [Amount] |
  | Certification audit fees | [Amount] |
  | Training | [Amount] |
  | Contingency (15%) | [Amount] |
  | **Total** | **[Amount]** |

  ### 8. Key Risks
  | Risk | Likelihood | Impact | Mitigation |
  |------|-----------|--------|-----------|
  | Scope creep | Medium | High | Fixed scope with change control |
  | Resource constraints | High | Medium | Early resource commitment from departments |
  | Audit delays | Low | Medium | Book auditor early, maintain schedule buffer |
  | Staff resistance | Medium | Medium | Executive sponsorship, clear communication |

  ### 9. Assumptions and Constraints
  **Assumptions:**
  - Executive sponsorship sustained for full program duration
  - Department heads will allocate staff time for assessments and control implementation
  - Current IT infrastructure supports required controls (no major infrastructure overhaul needed)

  **Constraints:**
  - Budget fixed at [amount] -- scope adjustments preferred over budget increases
  - Certification must be achieved before [date] (contractual commitment to customer)
  - Internal audit resource must be independent (may require external auditor)

