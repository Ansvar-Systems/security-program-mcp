summary: "Change management strategy for rolling out new or significantly updated security policies, covering stakeholder engagement, review cycles, training, acknowledgment tracking, and enforcement."
source: "ISO 27001:2022 Clause 5.2, ISACA governance framework"
tags: "change-management, policy, compliance, acknowledgment, training"
metadata:
  roles: "Policy Owner, Legal, HR, Department Heads, Communications"
  deliverables: "Policy draft, review comments, training materials, acknowledgment records"
content: |
  ## Change Management: Security Policy Updates

  ### Policy Update Lifecycle

  1. **Draft:** Policy Owner creates new or updated policy
  2. **Legal review:** Legal validates regulatory alignment and enforceability
  3. **Stakeholder review:** Department Heads review for operational feasibility (2-week review window)
  4. **Revision:** Incorporate feedback, resolve conflicts
  5. **Approval:** CISO or Steering Committee approves
  6. **Communication:** Announce to affected staff with summary of changes
  7. **Training:** Deliver training on material changes (not required for minor updates)
  8. **Acknowledgment:** Staff acknowledge they have read and understand the policy
  9. **Enforcement:** Policy effective after communication + grace period

  ### Communication by Change Magnitude

  | Change Type | Communication | Training | Grace Period |
  |-------------|--------------|----------|-------------|
  | Minor (typo, clarification) | Change log update | None | None |
  | Moderate (new section, process change) | Email + intranet post | Optional briefing | 2 weeks |
  | Major (new policy, significant change) | All-hands mention + email + intranet | Required training | 4 weeks |
  | Regulatory-driven (NIS2, DORA, GDPR) | Formal announcement from CISO | Required training | As regulation requires |

  ### Acknowledgment Tracking
  - Use HR system or GRC tool for policy acknowledgment
  - Track: policy name, version, staff name, date acknowledged
  - Escalation for non-acknowledgment: 1 reminder at 1 week, manager notification at 2 weeks, HR escalation at 4 weeks
  - Target: 95%+ acknowledgment within grace period
