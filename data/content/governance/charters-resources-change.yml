id: resource-security-team-small
type: resource_model
category: risk-management
title: "Resource Model -- Small Organization Security Team (50-200 employees)"
summary: "Staffing model, role definitions, and budget framework for building a security team in a small organization with 50-200 employees."
source: "SANS security team models, industry salary surveys"
tags: "resource-model, staffing, team, budget, small-organization, roles"
metadata:
  team_size: "2-4 FTE"
  budget_range: "EUR 200K-500K/year (staff + tools)"
content: |
  ## Resource Model: Small Organization (50-200 employees)

  ### Team Structure
  For organizations with 50-200 employees, a dedicated security team of 2-4 people covers core needs. Many functions are shared with IT.

  **Core Team (2 FTE minimum):**

  | Role | FTE | Responsibilities | Required Skills |
  |------|-----|-----------------|-----------------|
  | Security Manager / CISO | 1.0 | Strategy, governance, risk management, compliance, vendor oversight, board reporting | GRC experience, management, 7+ years security |
  | Security Engineer | 1.0 | Vulnerability management, monitoring, incident response, technical controls, security tooling | Technical security, SIEM, networking, 3+ years |

  **Extended Team (add as budget allows):**

  | Role | FTE | When to Add |
  |------|-----|------------|
  | GRC Analyst | 0.5-1.0 | When pursuing certification (ISO 27001, SOC 2) |
  | SOC Analyst | 1.0 | When 24x7 monitoring is required (consider MSSP instead) |

  ### Shared Responsibilities (with IT)
  - Patch management: IT Operations with security oversight
  - Identity management: IT Operations with security policy
  - Backup and recovery: IT Operations with security requirements
  - Endpoint management: IT Operations with security configuration

  ### Outsourcing Strategy
  - **Outsource:** Penetration testing (annual), forensic incident response (retainer), 24x7 monitoring (MSSP), specialized compliance consulting
  - **Keep in-house:** Risk management, policy, vendor oversight, security architecture decisions, incident coordination

  ### Budget Framework

  | Category | Annual Range | Notes |
  |----------|-------------|-------|
  | Staff (2 FTE) | EUR 120K-200K | Varies by location and seniority |
  | SIEM / Monitoring | EUR 15K-40K | Cloud SIEM or MSSP |
  | Vulnerability scanner | EUR 5K-20K | Depends on asset count |
  | EDR | EUR 10K-30K | Per-endpoint licensing |
  | Penetration testing | EUR 10K-30K | Annual external assessment |
  | Training and certifications | EUR 5K-15K | Per team member per year |
  | GRC tool (optional) | EUR 5K-20K | If pursuing certification |
  | Forensic retainer | EUR 5K-15K | Annual retainer fee |
  | Contingency (10%) | EUR 15K-35K | |
  | **Total** | **EUR 190K-405K** | |

