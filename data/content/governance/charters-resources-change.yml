id: charter-security-program
type: program_charter
category: risk-management
title: "Program Charter -- Enterprise Security Program"
summary: "Program charter template for establishing or maturing an enterprise security program covering vision, capabilities, governance, phased roadmap, and success metrics."
source: "NIST CSF 2.0, ISACA COBIT, SANS Critical Security Controls"
tags: "charter, security-program, enterprise, capabilities, roadmap"
metadata:
  sponsor_role: "CTO or CEO"
  duration: "18-24 months (initial build)"
content: |
  ## Program Charter: Enterprise Security Program

  ### 1. Purpose
  Build a risk-based cybersecurity program that protects organizational assets, meets regulatory obligations, supports business growth, and establishes a sustainable security operations capability.

  ### 2. Vision
  A security program that enables the business by: protecting customer trust, meeting compliance requirements efficiently, reducing the cost of security incidents, and providing confidence to stakeholders that risks are managed.

  ### 3. Scope
  - Governance and risk management framework
  - Identity and access management
  - Vulnerability management
  - Security monitoring and incident response
  - Security awareness and training
  - Compliance management (for selected frameworks)
  - Third-party risk management
  - Data protection

  ### 4. Phased Roadmap
  **Phase 1 (Months 1-6): Foundation**
  - Hire CISO / Security Lead
  - Conduct risk assessment
  - Establish governance structure
  - Implement identity and access management
  - Launch vulnerability management

  **Phase 2 (Months 6-12): Core Capabilities**
  - Build incident response capability
  - Deploy security monitoring (SIEM)
  - Launch security awareness program
  - Begin compliance program (framework selection + gap analysis)
  - Implement third-party risk management

  **Phase 3 (Months 12-18): Maturity**
  - Achieve target compliance certifications
  - Establish metrics and reporting
  - Implement advanced detection (threat hunting)
  - Build data protection program
  - Conduct first external assessment

  **Phase 4 (Months 18-24): Optimization**
  - Automate security operations
  - Implement continuous compliance monitoring
  - Build red team / purple team capability
  - Optimize based on metrics and lessons learned

  ### 5. Success Criteria
  | Criterion | Measure | Phase 1 Target | Phase 4 Target |
  |-----------|---------|---------------|----------------|
  | Risk posture | NIST CSF maturity score | Tier 2 (Risk Informed) | Tier 3 (Repeatable) |
  | Vulnerability remediation | Critical patched within SLA | 70% | 95% |
  | Incident response | MTTD | <7 days | <24 hours |
  | Training completion | Staff trained | 80% | 95% |
  | Compliance | Target certifications | Gap analysis complete | Certified |

  ### 6. Governance
  - **Executive Sponsor:** [CEO/CTO] -- strategic direction, budget authority, organizational mandate
  - **Program Lead:** [CISO] -- program execution, team leadership
  - **Steering Committee:** Sponsor + CxO team -- quarterly review
  - **Working Group:** Security team + IT + business reps -- bi-weekly

