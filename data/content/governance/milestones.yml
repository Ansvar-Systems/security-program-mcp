id: milestones-zero-trust
type: milestone_framework
category: architecture
title: "Zero Trust Architecture Milestones"
summary: "Phase-gate milestones for Zero Trust architecture rollout from identity foundation through continuous verification, aligned to CISA Zero Trust Maturity Model pillars."
source: "NIST SP 800-207, CISA Zero Trust Maturity Model"
tags: "milestones, zero-trust, architecture, identity, microsegmentation, cisa"
metadata:
  total_milestones: "6"
  duration: "18 months"
content: |
  ## Zero Trust Architecture Milestones

  ### M1: Strategy and Baseline Complete (Month 2)
  **Gate Criteria:**
  - Current state assessed against CISA ZTMM (5 pillars)
  - Protect surfaces identified and documented
  - Target maturity level defined per pillar
  - Executive-approved Zero Trust strategy and roadmap
  - Budget allocated for Year 1
  **Evidence:** ZTMM assessment, strategy document, budget approval

  ### M2: Identity Foundation Complete (Month 5)
  **Gate Criteria:**
  - Single identity provider with SSO for all applications
  - MFA enforced for all users (100% enrollment)
  - Conditional access policies active
  - Privileged access management deployed
  - JIT/JEA access for administrative operations
  **Evidence:** IdP configuration, MFA enrollment metrics, PAM deployment records

  ### M3: Device Trust Established (Month 8)
  **Gate Criteria:**
  - Endpoint management deployed (95%+ coverage)
  - Device health policies enforced at authentication time
  - Non-compliant device access restricted
  - BYOD access policy implemented
  **Evidence:** Device inventory, compliance policy configuration, access restriction logs

  ### M4: Network Microsegmented (Month 11)
  **Gate Criteria:**
  - Critical workloads microsegmented
  - Default-deny between segments enforced
  - ZTNA replacing VPN for remote access
  - East-west encryption deployed for priority segments
  **Evidence:** Network architecture diagrams, firewall rules, ZTNA configuration

  ### M5: Application Access Controlled (Month 14)
  **Gate Criteria:**
  - Per-application access policies active for Tier 1 applications
  - Context-aware authorization (user + device + location + behavior)
  - API gateway with authentication for all APIs
  - Legacy applications proxied or isolated
  **Evidence:** Access policy configurations, API gateway logs

  ### M6: Continuous Verification Operational (Month 18)
  **Gate Criteria:**
  - UEBA deployed and tuned
  - Automated response playbooks for Zero Trust policy violations
  - ZTMM reassessment showing maturity advancement
  - Continuous monitoring dashboard operational
  **Evidence:** UEBA deployment, SOAR playbooks, ZTMM reassessment report
