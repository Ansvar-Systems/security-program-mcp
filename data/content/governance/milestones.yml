id: milestones-vulnerability-management
type: milestone_framework
category: security-operations
title: "Vulnerability Management Program Milestones"
summary: "Phase-gate milestones for standing up a vulnerability management program from asset discovery through metrics-driven continuous improvement."
source: "NIST SP 800-40r4, FIRST CVSS, CISA KEV, EPSS"
tags: "milestones, vulnerability-management, scanning, patching, remediation"
metadata:
  total_milestones: "5"
  duration: "2-3 months"
content: |
  ## Vulnerability Management Program Milestones

  ### M1: Asset Inventory Complete (Week 2)
  **Gate Criteria:**
  - Network discovery scan completed for all subnets
  - Cloud asset inventory integrated
  - Assets classified by criticality tier (Tier 1/2/3)
  - Asset owners assigned
  - Coverage gap < 5% (assets visible vs. known inventory)
  **Evidence:** Asset inventory report, coverage metrics

  ### M2: Scanning Operational (Week 4)
  **Gate Criteria:**
  - Vulnerability scanner deployed with authenticated scanning configured
  - Scan schedules active: external (weekly), internal (weekly), container (on build + weekly)
  - Initial full scan completed
  - Scan coverage > 95% of asset inventory
  - Prioritization methodology documented and approved
  **Evidence:** Scan results, scan coverage report, prioritization document

  ### M3: Remediation Workflow Active (Week 6)
  **Gate Criteria:**
  - Automated ticket creation for findings above threshold
  - Remediation SLAs defined and approved
  - Exception process documented with approval workflow
  - Patching schedule aligned with change management
  - First remediation cycle completed
  **Evidence:** Ticket system integration, SLA document, exception log

  ### M4: Metrics Baseline Established (Week 8)
  **Gate Criteria:**
  - MTTR measured for first full cycle
  - SLA compliance rate calculated
  - Open vulnerability count baselined
  - Vulnerability density per asset calculated
  - Weekly and monthly report templates operational
  **Evidence:** Metrics dashboard, baseline report

  ### M5: Continuous Improvement Active (Week 10-12)
  **Gate Criteria:**
  - Second scan-remediation cycle completed
  - MTTR trending data available (compare cycle 1 vs. cycle 2)
  - Root cause analysis conducted for SLA breaches
  - CISA KEV monitoring automated
  - Executive quarterly report template approved
  **Evidence:** Trend reports, root cause analysis, CISA KEV monitoring evidence

