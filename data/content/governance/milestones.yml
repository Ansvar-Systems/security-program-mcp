id: milestones-iso27001
type: milestone_framework
category: compliance
title: "ISO 27001 Certification Milestone Framework"
summary: "Phase-gate milestones for ISO 27001:2022 certification with success criteria at each stage, from ISMS scoping through certification and surveillance."
source: "ISO 27001:2022, ISO 27003, certification body practices"
tags: "milestones, iso27001, isms, certification, phase-gate"
metadata:
  total_milestones: "8"
  duration: "9-12 months"
content: |
  ## ISO 27001 Certification Milestones

  ### M1: Scope Approved (Month 1)
  **Gate Criteria:**
  - ISMS scope statement written and approved by top management
  - Context of the organization documented (Clause 4.1, 4.2)
  - ISMS Manager appointed with defined authority
  - Project plan with timeline and budget approved
  **Evidence:** Signed scope statement, management commitment letter, project charter

  ### M2: Risk Assessment Complete (Month 3)
  **Gate Criteria:**
  - Risk assessment methodology defined and approved
  - All assets within scope inventoried with owners assigned
  - Risk assessment conducted covering all in-scope assets/processes
  - Risk register created with all risks scored
  - Risk treatment options selected for all unacceptable risks
  **Evidence:** Risk assessment report, risk register, asset inventory

  ### M3: Statement of Applicability Approved (Month 4)
  **Gate Criteria:**
  - All 93 Annex A controls assessed for applicability
  - Justification documented for each included and excluded control
  - SoA approved by ISMS Manager and CISO
  - Risk treatment plan created with owners and deadlines
  **Evidence:** Statement of Applicability document, risk treatment plan

  ### M4: Policies and Procedures Complete (Month 5)
  **Gate Criteria:**
  - All mandatory ISMS procedures documented (Clauses 6-10)
  - Annex A supporting policies written (minimum: information security policy, access control, incident response, business continuity, acceptable use, cryptography)
  - Document control procedure operational
  - All documents reviewed and approved
  **Evidence:** Complete policy set, document register, approval records

  ### M5: Controls Implemented (Month 7)
  **Gate Criteria:**
  - All applicable Annex A controls implemented or have documented implementation plan for remaining items
  - Technical controls deployed and configured
  - Awareness training delivered to all in-scope personnel
  - Evidence of control operation for at least one full cycle
  **Evidence:** Control implementation records, training records, system configurations

  ### M6: Internal Audit Complete (Month 8)
  **Gate Criteria:**
  - Internal audit covering all ISMS clauses and applicable Annex A controls
  - Audit conducted by independent auditor(s)
  - All findings classified (major NC, minor NC, observation)
  - Corrective actions defined with owners and deadlines
  **Evidence:** Internal audit report, corrective action records

  ### M7: Management Review Complete (Month 8)
  **Gate Criteria:**
  - Management review conducted with top management
  - All required inputs covered (Clause 9.3.2)
  - Decisions documented on improvements, resource changes, risk acceptance
  - Minutes signed by top management representative
  **Evidence:** Management review minutes, decisions register

  ### M8: Certification Achieved (Month 9-12)
  **Gate Criteria:**
  - Stage 1 audit completed and findings addressed
  - Stage 2 audit completed
  - No unresolved major non-conformities
  - All minor non-conformities addressed within 90 days
  - Certificate issued by accredited certification body
  **Evidence:** Stage 1 report, Stage 2 report, certificate, corrective action closures

