id: milestones-soc-build
type: milestone_framework
category: security-operations
title: "SOC Build Milestone Framework"
summary: "Phase-gate milestones for building a Security Operations Center from initial planning through full operational capability."
source: "SANS SOC model, MITRE ATT&CK, NIST SP 800-61r3"
tags: "milestones, soc, operations, detection, monitoring, phase-gate"
metadata:
  total_milestones: "6"
  duration: "6 months"
content: |
  ## SOC Build Milestones

  ### M1: SOC Charter Approved (Week 3)
  **Gate Criteria:**
  - SOC mission, scope, and service catalog defined
  - Operating model selected (internal, hybrid, MSSP)
  - Operating hours defined
  - Budget and headcount approved
  - SOC Manager hired or assigned
  **Evidence:** SOC charter document, budget approval, hiring plan

  ### M2: SIEM Operational (Week 8)
  **Gate Criteria:**
  - SIEM platform deployed and configured
  - Critical log sources onboarded: authentication (IdP), firewall/network, endpoint (EDR), email, cloud audit
  - Log parsing and normalization verified (no critical field extraction failures)
  - Baseline detection rules deployed (vendor-provided pack)
  - Data retention meets requirements (90+ days for security logs)
  **Evidence:** SIEM dashboard, log source inventory, data ingestion metrics

  ### M3: Team Operational (Week 10)
  **Gate Criteria:**
  - L1 and L2 analysts hired/assigned and trained
  - Shift schedule active (covering defined operating hours)
  - Analyst workstations configured with required tools
  - Initial training completed (SIEM usage, triage procedures, escalation workflow)
  **Evidence:** Team roster, shift schedule, training records

  ### M4: Detection Content Deployed (Week 14)
  **Gate Criteria:**
  - Custom detection rules for organization-specific threats deployed
  - Detection coverage mapped to MITRE ATT&CK (minimum: initial access, execution, persistence, credential access, lateral movement)
  - False positive rate at manageable level (< 50% of alerts)
  - Triage runbooks created for each alert type
  **Evidence:** Detection rule inventory, ATT&CK coverage matrix, false positive metrics, runbooks

  ### M5: Processes Validated (Week 18)
  **Gate Criteria:**
  - Alert triage workflow tested end-to-end
  - Incident escalation procedure tested
  - Shift handoff procedure working
  - SOC-to-IR escalation pathway tested
  - Purple team exercise completed with acceptable detection rate
  **Evidence:** Purple team report, process documentation, exercise results

  ### M6: Full Operational Capability (Week 24)
  **Gate Criteria:**
  - SOC operating at defined service levels for 30+ consecutive days
  - MTTD and MTTR metrics within target
  - Monthly reporting operational
  - Continuous improvement process established (detection tuning cycle, lessons learned)
  - Management satisfied with coverage and quality
  **Evidence:** 30-day metrics, management sign-off, monthly report

