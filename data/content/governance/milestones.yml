id: milestones-nis2-compliance
type: milestone_framework
category: compliance
title: "NIS2 Compliance Milestone Framework"
summary: "Phase-gate milestones for NIS2 Directive compliance with success criteria covering scoping, governance, Article 21 implementation, and ongoing compliance."
source: "NIS2 Directive (EU) 2022/2555 via EUR-Lex"
tags: "milestones, nis2, compliance, eu, phase-gate, article-21"
metadata:
  total_milestones: "7"
  duration: "12 months"
content: |
  ## NIS2 Compliance Milestones

  ### M1: Scoping and Classification Complete (Month 2)
  **Gate Criteria:**
  - Entity classification confirmed (essential vs. important)
  - National transposition law identified and reviewed
  - Gap analysis against all 10 Article 21 measures completed
  - Remediation budget approved
  **Evidence:** Classification document, gap analysis report, budget approval

  ### M2: Governance Established (Month 4)
  **Gate Criteria:**
  - Management body briefed on NIS2 obligations
  - Management body training completed and documented
  - Information security policy approved
  - Risk management framework defined
  - Initial risk assessment completed
  **Evidence:** Training records, policy documents, risk assessment report

  ### M3: Incident Reporting Capability Ready (Month 6)
  **Gate Criteria:**
  - Incident detection and classification capability operational
  - Notification workflow tested against Article 23 timelines (24h/72h/1 month)
  - Contact established with national CSIRT
  - Incident response playbooks for top 5 threat scenarios created
  **Evidence:** Tabletop exercise report, CSIRT contact confirmation, playbooks

  ### M4: Supply Chain Security Program Active (Month 7)
  **Gate Criteria:**
  - All ICT suppliers inventoried and classified by criticality
  - Top-tier suppliers assessed
  - Security requirements included in procurement contracts
  - Supplier incident notification requirements established
  **Evidence:** Supplier inventory, assessment reports, contract templates

  ### M5: Technical Controls Deployed (Month 9)
  **Gate Criteria:**
  - MFA deployed for all privileged and remote access
  - Vulnerability management program operational
  - Business continuity plan tested
  - Encryption deployed for sensitive data
  - Network segmentation for critical systems
  **Evidence:** MFA enrollment records, scan reports, BC test results, encryption records

  ### M6: Training and Effectiveness Assessment (Month 11)
  **Gate Criteria:**
  - Organization-wide awareness training delivered (95%+ completion)
  - Effectiveness assessment conducted (internal audit of all 10 measures)
  - Penetration test of critical systems completed
  - KPIs defined and dashboard operational
  **Evidence:** Training completion report, audit report, penetration test report, KPI dashboard

  ### M7: Registration and Ongoing Operations (Month 12)
  **Gate Criteria:**
  - Registered with national competent authority
  - Annual compliance calendar established
  - Continuous improvement plan documented
  - All Article 21 measures operational
  **Evidence:** Registration confirmation, compliance calendar, improvement plan

