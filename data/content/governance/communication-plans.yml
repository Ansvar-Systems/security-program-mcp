id: commplan-vendor-security
type: communication_plan
category: risk-management
title: "Communication Plan -- Vendor Security Program"
summary: "Communication strategy for engaging vendors in security assessment and compliance, covering initial notification, assessment process, remediation, and ongoing monitoring."
source: "ISO 27001:2022 A.5.19-A.5.23, NIST SP 800-161"
tags: "communication, vendor, third-party, assessment, supply-chain"
metadata:
  audiences: "Vendor Management, Key Vendors, Procurement, Internal Stakeholders"
  cadence: "Per vendor lifecycle stage"
content: |
  ## Communication Plan: Vendor Security Program

  ### Vendor Notification Timeline

  | Stage | Timing | Communication | Owner |
  |-------|--------|--------------|-------|
  | Program announcement | 90 days before first assessment | Formal letter announcing new security requirements | Vendor Manager |
  | Assessment notification | 60 days before assessment | Assessment scope, timeline, what to prepare | Security Analyst |
  | Questionnaire distribution | 45 days before deadline | Questionnaire with instructions and support contact | Security Analyst |
  | Reminder | 14 days before deadline | Follow-up for non-respondents | Vendor Manager |
  | Results notification | Within 30 days of assessment | Risk rating, findings, remediation requirements | Security Analyst |
  | Remediation follow-up | Monthly until resolved | Progress check on open findings | Vendor Manager |
  | Annual reassessment | 60 days before anniversary | Reassessment notification | Security Analyst |

  ### Vendor Communication Templates

  **Initial Program Announcement:**
  - Why: Regulatory requirement and customer obligation
  - What: Annual security assessment for all vendors handling our data or accessing our systems
  - When: Assessment cycle starts on [date]
  - Impact: Vendor cooperation required; non-compliance may affect contract renewal
  - Support: Dedicated contact for questions

  **Assessment Results (passing):**
  - Thank you for cooperation
  - Overall risk rating
  - Any recommendations for improvement
  - Next assessment date

  **Assessment Results (findings):**
  - Overall risk rating
  - Specific findings requiring remediation
  - Remediation deadlines by severity
  - Support available from our team
  - Escalation path if deadlines cannot be met

  ### Internal Stakeholder Communication
  - Business Owners: Risk summary for their vendors, action required for high-risk vendors
  - Procurement: Updated security requirements for new contracts
  - Legal: Vendors requiring contract amendments
  - Executive: Quarterly vendor risk summary

