id: commplan-board-security-reporting
type: communication_plan
category: risk-management
title: "Communication Plan -- Board Security Reporting"
summary: "Framework for reporting cybersecurity posture to the board of directors, covering content structure, frequency, metrics, and presentation approach."
source: "NACD Cyber-Risk Oversight Handbook, SEC cybersecurity disclosure rules, NIS2 Article 20"
tags: "communication, board, reporting, executive, risk-posture, governance"
metadata:
  audiences: "Board of Directors, Audit Committee"
  cadence: "Quarterly (minimum), ad hoc for material events"
content: |
  ## Communication Plan: Board Security Reporting

  ### Reporting Cadence

  | Occasion | Format | Duration | Audience |
  |----------|--------|----------|----------|
  | Quarterly board meeting | Presentation + written report | 15-20 minutes | Full Board |
  | Audit committee meeting | Detailed written report | 30 minutes | Audit Committee |
  | Material incident | Immediate briefing | As needed | Board Chair + Audit Committee Chair |
  | Annual strategy | Presentation + discussion | 45-60 minutes | Full Board |

  ### Quarterly Report Structure (recommended 5-7 slides)

  **Slide 1: Executive Summary**
  - Overall risk posture: Improved / Stable / Degraded (with one-sentence explanation)
  - Top 3 risks (risk register extract)
  - Key metric: [choose one that tells the story -- e.g., "95% of critical vulnerabilities remediated within SLA"]

  **Slide 2: Threat Landscape**
  - Relevant threats to our sector in this quarter
  - Incidents at peer organizations (anonymized lessons)
  - Changes in regulatory environment

  **Slide 3: Program Progress**
  - Key initiatives status (3-5 initiatives, RAG status)
  - Milestones achieved this quarter
  - Budget status (spent vs. planned)

  **Slide 4: Metrics Dashboard**
  - 4-6 metrics the board has agreed to track, trended over 4 quarters
  - Red/amber/green against targets
  - Brief commentary on significant changes

  **Slide 5: Incidents**
  - Count by severity, comparison to prior quarter
  - Notable incidents (anonymized if sensitive) with lessons learned
  - If no incidents: "No material security incidents this quarter"

  **Slide 6: Compliance Status**
  - Certification/attestation status (ISO 27001, SOC 2, NIS2)
  - Upcoming audits or assessments
  - Open audit findings count and remediation progress

  **Slide 7: Decisions Needed**
  - Specific decisions requested from the board
  - Each with: recommendation, rationale, risk of inaction, budget impact

  ### Board-Appropriate Metrics (pick 4-6)

  | Metric | Why Board Cares | Target |
  |--------|----------------|--------|
  | Critical vulnerability remediation within SLA | Measures operational effectiveness | >95% |
  | Mean time to detect (MTTD) | Measures detection capability | <24 hours |
  | Phishing simulation click rate | Measures human risk | <5% |
  | Third-party vendor risk score | Measures supply chain exposure | >80% assessed |
  | Compliance posture score | Regulatory exposure | All certifications current |
  | Security training completion | Staff readiness | >95% |

  ### Presentation Guidelines
  - No jargon -- define technical terms or use business language
  - Focus on risk and business impact, not technical details
  - Compare to industry benchmarks where possible
  - Be honest about gaps -- boards lose trust if surprised later
  - Always include "what are we doing about it" for each risk
  - Have technical backup slides ready for questions
