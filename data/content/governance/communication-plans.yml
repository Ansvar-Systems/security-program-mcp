id: commplan-compliance-program
type: communication_plan
category: compliance
title: "Communication Plan -- Compliance Program"
summary: "Stakeholder communication schedule for a compliance program (ISO 27001, SOC 2, NIS2) covering executive updates, team coordination, audit communications, and organization-wide announcements."
source: "PMI PMBOK communications management, ISACA governance framework"
tags: "communication, compliance, stakeholder, reporting, executive"
metadata:
  audiences: "Board, Executive Team, Project Team, All Staff, External Auditor, Regulators"
  cadence: "Weekly to annually depending on audience"
content: |
  ## Communication Plan: Compliance Program

  ### Stakeholder Map

  | Stakeholder | Interest | Influence | Communication Need |
  |-------------|---------|-----------|-------------------|
  | Board / Management Body | Risk posture, liability | Very High | Quarterly strategic update |
  | Executive Team (CxO) | Budget, timeline, business impact | High | Monthly progress report |
  | Program Team | Task assignments, blockers | High | Weekly status meetings |
  | Department Heads | Impact on their teams, resource needs | Medium | Monthly coordination |
  | All Staff | Training, policy changes | Low-Medium | Quarterly awareness updates |
  | External Auditor | Scope, evidence, readiness | Medium | Pre-audit and during audit |
  | Regulators | Compliance status | Low (until engagement) | Registration, incident reports |

  ### Communication Schedule

  | Audience | Format | Frequency | Owner | Content |
  |----------|--------|-----------|-------|---------|
  | Board | Presentation (10 min) | Quarterly | CISO | Risk posture, program status, budget, key decisions needed |
  | Executive Team | Written report + meeting | Monthly | Program Manager | Milestone progress, RAG status, budget burn, risks, decisions needed |
  | Program Team | Standup meeting | Weekly | Program Manager | Task status, blockers, coordination needs |
  | Department Heads | Email update | Monthly | Program Manager | Upcoming activities affecting their teams, resource requests |
  | All Staff | Email / Intranet post | Quarterly + ad hoc | Comms Lead | New policies, training requirements, program milestones |
  | All Staff | Training session | At program start + annually | Awareness Lead | Security awareness, policy changes, compliance requirements |
  | External Auditor | Kickoff meeting + ongoing | Per engagement | Compliance Manager | Scope, evidence, findings, management responses |

  ### Escalation Triggers
  - **Immediate executive escalation:** Major scope change, budget overrun >15%, compliance deadline at risk, audit finding with material impact
  - **Board escalation:** Regulatory enforcement action, material compliance gap, certification risk
  - **All-staff communication:** New policy requiring action, security incident affecting staff, training deadline

  ### Message Templates

  **Monthly Executive Report Structure:**
  1. Executive summary (3 sentences: status, key achievement, key risk)
  2. Milestone tracker (completed, in progress, upcoming)
  3. Risk and issues log
  4. Budget status (spent vs. planned)
  5. Decisions needed
  6. Next month focus

  **Quarterly Board Briefing Structure:**
  1. Compliance posture summary (one slide)
  2. Key risks and mitigations
  3. Program progress vs. plan
  4. Regulatory landscape changes
  5. Budget and resource needs
  6. Recommended actions

