id: commplan-incident-response
type: communication_plan
category: security-operations
title: "Communication Plan -- Incident Response"
summary: "Communication procedures during security incidents covering internal escalation, management notification, customer notification, regulatory reporting, and media response."
source: "NIST SP 800-61r3, NIS2 Article 23, GDPR Article 33-34"
tags: "communication, incident-response, notification, regulatory, media, crisis"
metadata:
  audiences: "IR Team, Management, Legal, Customers, Regulators, CSIRT, Media"
  cadence: "Event-driven with defined timelines"
content: |
  ## Communication Plan: Incident Response

  ### Communication Channels

  | Channel | Purpose | When to Use |
  |---------|---------|------------|
  | Out-of-band chat (Signal/Teams) | IR team coordination | During all incidents (assume corporate systems compromised) |
  | Phone / conference bridge | Real-time coordination | SEV-1 and SEV-2 incidents |
  | Email (secure) | Formal notifications, reports | Post-containment updates, regulatory notifications |
  | Incident ticket system | Case documentation | All incidents (evidence and audit trail) |
  | War room (physical or virtual) | Sustained response | SEV-1 incidents lasting >4 hours |

  ### Internal Notification Matrix

  | Severity | IR Team | IT Ops | CISO | CEO/MD | Legal | HR | Comms | Board |
  |----------|---------|--------|------|--------|-------|----|-------|-------|
  | SEV-1 | Immediate | Immediate | Immediate | Within 1h | Within 1h | If needed | Within 2h | Within 24h |
  | SEV-2 | Immediate | Immediate | Within 1h | Within 4h | Within 4h | If needed | If needed | Next board meeting |
  | SEV-3 | Immediate | If needed | Next business day | No | If needed | If needed | No | No |
  | SEV-4 | Immediate | No | Weekly summary | No | No | No | No | No |

  ### Regulatory Notification Timelines

  | Regulation | Trigger | Initial Notification | Follow-up | Final Report |
  |------------|---------|---------------------|-----------|-------------|
  | NIS2 | Major incident | 24 hours (early warning) | 72 hours (incident notification) | 1 month |
  | GDPR | Personal data breach | 72 hours (to DPA) | As requested | After investigation |
  | DORA | Major ICT incident | 4 hours (classification) | 72 hours (intermediate) | 1 month |
  | US State Breach Laws | PII breach | Varies (30-90 days) | As required | As required |

  ### Customer Communication Guidelines

  **When to notify customers:**
  - Their data was accessed, exfiltrated, or exposed
  - Service availability impacted beyond published SLA
  - Their systems may be at risk (e.g., compromised integration)
  - Contractual or regulatory obligation requires it

  **Customer notification content:**
  - What happened (factual, no speculation)
  - What data/services were affected
  - What actions we have taken
  - What actions they should take (password reset, monitoring)
  - Contact information for questions
  - Commitment to ongoing updates

  **Do NOT include:** Attribution to specific threat actors (unless confirmed), speculation about impact scope, technical details that could aid attackers, legal admissions

  ### Media Response
  - All media inquiries routed through Communications Lead
  - No technical staff speak to media without approval
  - Prepare holding statement within 4 hours of SEV-1
  - Legal reviews all public statements before release
  - Designate a single spokesperson

