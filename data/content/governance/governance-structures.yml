id: governance-dora-oversight
type: governance_structure
category: compliance
title: "DORA ICT Risk Governance Structure"
summary: "Governance structure for DORA compliance including management body oversight, ICT risk management function, resilience testing governance, and third-party oversight committee."
source: "DORA Regulation (EU) 2022/2554, EBA guidelines on ICT risk management"
tags: "governance, dora, ict-risk, financial-services, resilience, third-party"
metadata:
  committees: "4 (Management Body, ICT Risk Committee, Resilience Testing Board, Third-Party Oversight)"
  reporting_cadence: "Management Body: quarterly, ICT Risk: monthly, Testing: quarterly, Third-Party: monthly"
content: |
  ## DORA ICT Risk Governance Structure

  ### Management Body (Article 5)
  **Purpose:** Ultimate responsibility for ICT risk management
  **Composition:** Board of Directors or senior management body
  **Cadence:** Quarterly ICT risk review (minimum)
  **Responsibilities:**
  - Define and approve ICT risk management framework
  - Approve ICT risk tolerance and appetite
  - Allocate budget for digital operational resilience
  - Review and approve ICT business continuity policy
  - Approve major ICT projects and changes
  - Review results of resilience testing
  **DORA-Specific Requirements:**
  - Must actively engage in ICT risk management (not delegable)
  - Must approve all ICT-related policies
  - Must complete training on ICT risks (at least annually)

  ### ICT Risk Committee
  **Purpose:** Oversee day-to-day ICT risk management per Articles 6-16
  **Composition:** CRO or ICT Risk Manager (chair), CISO, CTO, Operations Head, Compliance
  **Cadence:** Monthly
  **Agenda:**
  - ICT risk register review
  - Incident handling metrics (classification, reporting compliance)
  - ICT asset inventory updates
  - Protection measure effectiveness
  - Recovery capability status
  - Budget utilization
  **Output:** Monthly ICT risk report to management body

  ### Resilience Testing Board
  **Purpose:** Govern the digital operational resilience testing program (Articles 24-27)
  **Composition:** CISO (chair), CTO, External Testing Lead, Business Continuity Manager
  **Cadence:** Quarterly
  **Responsibilities:**
  - Approve annual testing program
  - Review testing results and remediation progress
  - Oversee TLPT engagements (if designated)
  - Report to management body on resilience posture
  - Approve testing vendor selection

  ### Third-Party Oversight Committee (Articles 28-44)
  **Purpose:** Manage ICT third-party risk including contractual compliance and concentration risk
  **Composition:** Vendor Manager (chair), CISO, Legal, Procurement, Business Owners
  **Cadence:** Monthly
  **Responsibilities:**
  - Maintain ICT third-party service provider register
  - Monitor contractual compliance (Article 30)
  - Assess and monitor concentration risk
  - Review sub-outsourcing arrangements
  - Maintain exit strategies for critical providers
  - Interface with supervisory authorities on CTP designations

  ### Reporting to Competent Authority
  - Incident reports per Article 19-20 timelines
  - ICT third-party register on request
  - TLPT results when required
  - Annual resilience testing summary
