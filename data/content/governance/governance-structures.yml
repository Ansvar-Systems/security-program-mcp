id: governance-soc2-controls
type: governance_structure
category: compliance
title: "SOC 2 Control Governance Structure"
summary: "Governance structure for maintaining SOC 2 compliance, including control ownership, evidence management, and continuous monitoring across trust service categories."
source: "AICPA Trust Services Criteria, SOC 2 reporting best practices"
tags: "governance, soc2, controls, evidence, monitoring, trust-services"
metadata:
  committees: "2 (SOC 2 Steering, Control Owners Forum)"
  reporting_cadence: "Steering: monthly, Control Owners: bi-weekly"
content: |
  ## SOC 2 Control Governance Structure

  ### SOC 2 Steering Committee
  **Purpose:** Oversight of SOC 2 compliance program, audit readiness, and remediation
  **Composition:** CISO (chair), VP Engineering, VP Operations, Compliance Manager, Legal
  **Cadence:** Monthly (weekly during audit periods)
  **Responsibilities:**
  - Approve control matrix changes
  - Review compliance metrics (SLA adherence, evidence gaps, exception count)
  - Approve exceptions and compensating controls
  - Manage auditor relationship and audit timeline
  - Approve system description changes

  ### Control Owners Forum
  **Purpose:** Operational coordination of evidence collection and control execution
  **Composition:** Compliance Manager (facilitator), all control owners (Engineering, IT, HR, etc.)
  **Cadence:** Bi-weekly
  **Responsibilities:**
  - Review evidence collection status (dashboard walkthrough)
  - Address evidence gaps and quality issues
  - Coordinate cross-team control dependencies
  - Share upcoming changes that affect controls

  ### Control Ownership Model
  Each control has:
  - **Control Owner:** Person accountable for the control operating as designed
  - **Evidence Collector:** Person who gathers and submits evidence (may be same as owner)
  - **Reviewer:** Person who validates evidence quality (typically Compliance Manager)

  | Trust Service Category | Primary Control Owner | Evidence Cadence |
  |----------------------|---------------------|-----------------|
  | CC1 (Control Environment) | CISO / CEO | Annual |
  | CC2 (Communication) | Compliance Manager | Monthly |
  | CC3 (Risk Assessment) | CISO | Annual |
  | CC4 (Monitoring) | Compliance Manager | Monthly |
  | CC5 (Control Activities) | Department Heads | Monthly |
  | CC6 (Access Controls) | IT Operations Lead | Monthly |
  | CC7 (System Operations) | VP Engineering | Monthly |
  | CC8 (Change Management) | VP Engineering | Monthly |
  | CC9 (Risk Mitigation) | CISO | Quarterly |
  | Availability | VP Engineering | Monthly |
  | Confidentiality | CISO | Monthly |

  ### Continuous Monitoring
  - Evidence collection calendar with automated reminders
  - Monthly compliance dashboard showing: controls operating, evidence collected, exceptions open
  - Quarterly self-assessment against each criterion
  - Pre-audit readiness check (30 days before audit period ends)

