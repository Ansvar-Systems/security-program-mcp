id: governance-isms-steering
type: governance_structure
category: compliance
title: "ISMS Steering Committee Governance Structure"
summary: "Committee structure for governing an Information Security Management System, including board-level oversight, operational steering, and working group coordination."
source: "ISO 27001:2022 Clause 5, ISACA governance framework"
tags: "governance, isms, steering-committee, board, oversight, iso27001"
metadata:
  committees: "3 (Board Security Subcommittee, ISMS Steering Committee, Security Working Group)"
  reporting_cadence: "Board: quarterly, Steering: monthly, Working Group: bi-weekly"
content: |
  ## ISMS Governance Structure

  ### Tier 1: Board Security Subcommittee
  **Purpose:** Strategic oversight of information security and risk management
  **Composition:** 2-3 board members, CEO, CISO (invited)
  **Cadence:** Quarterly
  **Agenda:**
  - Cybersecurity risk posture summary
  - Material incidents since last meeting
  - Security program progress against objectives
  - Budget and resource decisions
  - Regulatory compliance status
  **Authority:** Approve security policy, approve risk appetite, allocate strategic budget
  **Output:** Meeting minutes, decisions log, action items

  ### Tier 2: ISMS Steering Committee
  **Purpose:** Operational governance of the ISMS, cross-functional coordination
  **Composition:** CISO (chair), CTO, CFO representative, Legal, HR, Business Unit leads (rotating), Internal Audit
  **Cadence:** Monthly
  **Agenda:**
  - Risk register review (new risks, changed risks, accepted risks)
  - Control implementation progress
  - Incident summary and lessons learned
  - Audit findings and corrective actions
  - Vendor security issues
  - Awareness training metrics
  - Upcoming changes (regulations, organization, technology)
  **Authority:** Approve risk treatment plans, approve policy changes, assign resources to security projects
  **Output:** Meeting minutes, updated risk register, action items, escalations to Board

  ### Tier 3: Security Working Group
  **Purpose:** Tactical coordination of security operations and projects
  **Composition:** CISO or Security Manager (chair), Security Engineers, SOC Lead, IT Operations Lead, GRC Analyst, project-specific participants
  **Cadence:** Bi-weekly
  **Agenda:**
  - Open security projects status
  - Vulnerability management metrics
  - Detection and response operational status
  - Upcoming changes requiring security review
  - Technical issue resolution
  **Authority:** Prioritize operational work, assign tasks within security team, escalate to Steering Committee
  **Output:** Task assignments, escalations, status updates

  ### Reporting Flow
  ```
  Board Security Subcommittee (quarterly)
       ^
       |  Quarterly security report
       |
  ISMS Steering Committee (monthly)
       ^
       |  Monthly operational summary
       |
  Security Working Group (bi-weekly)
  ```

  ### Key Governance Documents
  - Terms of reference for each committee
  - Decisions log (who decided what, when, with what authority)
  - Risk acceptance register (formal sign-off records)
  - Meeting minutes template with action tracking

