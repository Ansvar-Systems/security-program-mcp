id: governance-nis2-compliance
type: governance_structure
category: compliance
title: "NIS2 Compliance Governance Structure"
summary: "Governance structure meeting NIS2 Article 20 management body accountability requirements, including management training, cybersecurity oversight, and compliance reporting."
source: "NIS2 Directive Article 20, ENISA governance guidance"
tags: "governance, nis2, management-body, accountability, oversight, eu"
metadata:
  committees: "3 (Management Body, Cybersecurity Committee, Operational Team)"
  reporting_cadence: "Management Body: quarterly, Committee: monthly, Operational: weekly"
content: |
  ## NIS2 Compliance Governance Structure

  ### Management Body (Article 20 Compliance)
  **Purpose:** Fulfil NIS2 Article 20 requirement for management body accountability
  **Composition:** Board of Directors or equivalent management body
  **Cadence:** Quarterly cybersecurity briefing (minimum)
  **Responsibilities:**
  - Approve cybersecurity risk management measures (Article 20(1))
  - Oversee implementation of Article 21 measures
  - Complete cybersecurity training (Article 20(2))
  - Accept personal accountability for compliance failures
  **Required Training Topics:**
  - NIS2 obligations and personal liability
  - Cybersecurity risk landscape relevant to the entity
  - Risk management principles and the entity's risk posture
  - Incident reporting obligations and timelines

  ### Cybersecurity Committee
  **Purpose:** Operational oversight of NIS2 compliance across all 10 Article 21 measures
  **Composition:** CISO (chair), CTO, Legal, Operations, HR, key Business Unit leads
  **Cadence:** Monthly
  **Agenda by Article 21 Measure:**
  1. Risk analysis and policy status
  2. Incident handling metrics and readiness
  3. Business continuity test results
  4. Supply chain security status
  5. System security project progress
  6. Effectiveness assessment results
  7. Training completion metrics
  8. Cryptography implementation status
  9. HR security and access control metrics
  10. MFA and secure communications status
  **Output:** Monthly compliance dashboard for management body

  ### Operational Team
  **Purpose:** Execute NIS2 compliance activities day-to-day
  **Composition:** Security Manager, GRC Analyst, Security Engineers, IT Operations
  **Cadence:** Weekly
  **Responsibilities:**
  - Implement and maintain Article 21 controls
  - Manage incident response readiness
  - Conduct vulnerability management
  - Maintain supplier security assessments
  - Collect evidence for compliance reporting

  ### Competent Authority Interface
  - Designated contact point for communications with national competent authority
  - Registration maintained and updated as required
  - Incident notification workflow tested and documented
  - Prepared for potential inspections or audits

