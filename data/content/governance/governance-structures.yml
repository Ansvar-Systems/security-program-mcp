id: governance-security-program-office
type: governance_structure
category: risk-management
title: "Security Program Management Office (PMO) Structure"
summary: "Governance structure for managing a portfolio of security projects, including prioritization framework, resource allocation, progress reporting, and stakeholder management."
source: "PMI PMBOK, ISACA governance framework, NIST CSF organizational profiles"
tags: "governance, pmo, program-management, portfolio, prioritization, reporting"
metadata:
  committees: "3 (Security Portfolio Board, Program Delivery Team, Project Teams)"
  reporting_cadence: "Portfolio Board: monthly, Delivery Team: weekly, Projects: per-project"
content: |
  ## Security Program Management Office Structure

  ### Security Portfolio Board
  **Purpose:** Prioritize, fund, and oversee the portfolio of security initiatives
  **Composition:** CISO (chair), CTO, CFO, Business Unit VPs, Program Manager
  **Cadence:** Monthly
  **Responsibilities:**
  - Review and approve new project proposals
  - Prioritize projects based on risk reduction, regulatory requirement, and business value
  - Allocate resources across projects
  - Review overall portfolio health
  - Make go/no-go decisions at phase gates
  - Resolve cross-project conflicts

  ### Prioritization Framework
  Score each proposed project (1-5) on:
  - **Risk reduction:** How much does this reduce the organization's top risks?
  - **Regulatory driver:** Is this required by regulation or audit finding? (Binary: required = 5)
  - **Business enablement:** Does this enable revenue or remove a sales blocker?
  - **Effort:** Inverse score (low effort = 5, high effort = 1)
  - **Dependencies:** Can this start now or does it depend on other projects?

  Total score determines portfolio slot. Required-by-regulation projects always score highest.

  ### Program Delivery Team
  **Purpose:** Coordinate execution across active security projects
  **Composition:** Program Manager (lead), Project Managers, Technical Leads
  **Cadence:** Weekly
  **Responsibilities:**
  - Review project status (on track, at risk, blocked)
  - Manage resource conflicts
  - Identify and escalate risks
  - Coordinate dependencies between projects
  - Prepare portfolio report for Board

  ### Status Reporting
  - **Weekly:** Project status (RAG) with key metrics, blockers, decisions needed
  - **Monthly:** Portfolio dashboard for Board (budget burn, timeline adherence, risk reduction achieved)
  - **Quarterly:** Strategic alignment review (are projects delivering expected risk reduction?)

  ### Portfolio Health Metrics
  - Projects on track vs. at risk vs. blocked
  - Budget spent vs. planned
  - Risk reduction achieved vs. projected
  - Resource utilization (over/under-allocated)
  - Average project cycle time

