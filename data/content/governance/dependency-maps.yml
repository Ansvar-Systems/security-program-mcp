id: depmap-incident-response
type: dependency_map
category: security-operations
title: "Incident Response Program Dependency Map"
summary: "Prerequisite chains for building an incident response capability showing relationships between team formation, tooling, playbooks, and validation."
source: "NIST SP 800-61r3, SANS Incident Handler's Handbook"
tags: "dependencies, incident-response, csirt, detection, playbooks"
metadata:
  critical_path: "Team Formation -> Policy/Classification -> Playbooks -> Detection Rules -> Validation Exercise"
content: |
  ## Incident Response Program Dependency Map

  ### Critical Path
  ```
  IR Team Appointment
    -> IR Policy and Classification Scheme
      -> Playbook Development
        -> Detection Rule Deployment
          -> Tabletop Exercise
            -> Operational Readiness
  ```

  ### Full Dependency Table

  | Activity | Depends On | Blocks |
  |----------|-----------|--------|
  | IR Manager appointment | Management approval | Team formation |
  | Team formation | IR Manager | Playbook development, Detection |
  | IR policy | IR Manager | Classification scheme |
  | Classification scheme | IR policy | Playbooks, Detection rules |
  | On-call roster | Team formation | Operational readiness |
  | Out-of-band comms setup | None (start immediately) | Operational readiness |
  | Contact list creation | Team formation | Playbooks (notification sections) |
  | Playbook development | Classification, Contact list | Detection rules, Tabletop |
  | SIEM deployment/config | Budget approval | Detection rules |
  | EDR deployment | Budget approval | Containment capability |
  | Detection rule development | SIEM, Playbooks | Alert triage |
  | Alert triage workflow | Detection rules, Team | Operational readiness |
  | Evidence collection tools | Budget approval | Forensic capability |
  | Evidence procedures | Evidence tools, Legal input | Playbooks, Exercises |
  | Tabletop exercise | Playbooks, Team, Comms | Operational readiness |
  | Purple team exercise | Detection rules, Playbooks | Validation |
  | Regulatory notification workflow | Legal review, Contact list | Compliance readiness |
  | Metrics definition | Operational readiness | Reporting |

  ### Parallel Work Streams
  - SIEM/EDR deployment (technology) runs parallel with playbook development (process)
  - Contact list and communication setup run parallel with policy development
  - Training can start as soon as team is formed (doesn't need to wait for all playbooks)

  ### Common Bottlenecks
  - SIEM deployment often takes longer than expected (log source onboarding)
  - Legal review of notification procedures can delay playbook finalization
  - Finding qualified IR staff (tight market for experienced analysts)

