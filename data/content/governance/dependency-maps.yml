id: depmap-soc2
type: dependency_map
category: compliance
title: "SOC 2 Preparation Dependency Map"
summary: "Prerequisite chains for SOC 2 Type II preparation showing the relationship between scope definition, control design, evidence collection, and audit engagement."
source: "AICPA Trust Services Criteria, SOC 2 preparation practices"
tags: "dependencies, soc2, audit, evidence, controls, critical-path"
metadata:
  critical_path: "Scope -> Control Matrix -> Implementation -> Observation Period -> Audit"
content: |
  ## SOC 2 Preparation Dependency Map

  ### Critical Path
  ```
  Trust Service Category Selection
    -> System Description
      -> Control Matrix
        -> Control Implementation
          -> Evidence Collection (Observation Period Start)
            -> [3-12 months observation]
              -> Auditor Engagement
                -> Audit Execution
                  -> SOC 2 Report
  ```

  ### Full Dependency Table

  | Activity | Depends On | Blocks |
  |----------|-----------|--------|
  | TSC category selection | Business requirements | System description |
  | System description boundaries | TSC selection | Control matrix, Auditor scope |
  | Subservice org identification | System boundaries | Carve-out/inclusive decision |
  | Readiness assessment | System boundaries | Remediation plan |
  | Control matrix design | System description, TSC mapping | Control implementation |
  | Policy documentation | Control matrix | Evidence (policies as evidence) |
  | Technical control implementation | Control matrix | Evidence collection |
  | Operational control implementation | Control matrix, Policies | Evidence collection |
  | Evidence collection setup | Control matrix | Observation period |
  | Observation period start | Controls implemented | Audit engagement |
  | Automated evidence collection | Evidence setup | Reduces manual effort |
  | Access reviews (quarterly) | Access control implementation | Evidence |
  | Backup restore tests | Backup implementation | Evidence |
  | Vendor SOC report reviews | Subservice org identification | Evidence |
  | Auditor selection | Budget approval | Audit scheduling |
  | Audit engagement letter | Auditor selected, Scope agreed | Audit execution |
  | Audit execution | Observation period (minimum 3 months) | SOC 2 report |
  | Management response | Audit findings | Final report |

  ### Parallel Work Streams
  - Policy writing and technical implementation can run in parallel
  - Auditor selection can happen while controls are being implemented
  - Evidence collection starts as soon as each control is operational (not all at once)

  ### Common Bottlenecks
  - Observation period length: Type II requires minimum 3 months; 6-12 months is standard for first report
  - Subservice organization SOC reports may not be available on your timeline
  - Evidence gaps discovered late in observation period require restart for affected controls

