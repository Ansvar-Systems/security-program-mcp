id: depmap-security-program
type: dependency_map
category: risk-management
title: "Security Program Initialization Dependency Map"
summary: "Prerequisite chains for initializing a security program from scratch, showing relationships between governance, risk assessment, capability building, and compliance activities."
source: "ISACA governance framework, NIST CSF 2.0"
tags: "dependencies, security-program, governance, risk, capabilities"
metadata:
  critical_path: "Executive Sponsorship -> Risk Assessment -> Capability Priorities -> Implementation -> Measurement"
content: |
  ## Security Program Initialization Dependency Map

  ### Critical Path
  ```
  Executive Sponsorship & Budget
    -> CISO/Security Lead Hired
      -> Risk Assessment
        -> Capability Prioritization
          -> Implementation (parallel streams)
            -> Measurement & Reporting
  ```

  ### Full Dependency Table

  | Activity | Depends On | Blocks |
  |----------|-----------|--------|
  | Executive sponsorship | Business case | Budget, CISO hire |
  | Budget allocation | Executive sponsorship | All implementation |
  | CISO/Security Lead hire | Budget | Risk assessment, Governance |
  | Security team formation | CISO, Budget | All operational activities |
  | Governance structure | CISO | Policy framework |
  | Security policy framework | Governance structure | All compliance activities |
  | Asset inventory | Security team | Risk assessment |
  | Risk assessment | Assets, CISO, Methodology | Capability priorities |
  | Capability prioritization | Risk assessment | Implementation streams |
  | IAM/Access control | Priority decision, Budget | Other controls |
  | Vulnerability management | Priority decision, Asset inventory | Remediation |
  | Incident response | Priority decision, Team | Detection capability |
  | Security monitoring | Priority decision, SIEM budget | Detection and response |
  | Security awareness | Policy framework, Team | Compliance readiness |
  | Compliance framework selection | Business requirements | Compliance program |
  | Compliance program | Framework selection, Controls | Audit readiness |
  | Metrics and reporting | Capabilities operational | Executive visibility |
  | Board reporting | Metrics, Governance | Ongoing budget justification |

  ### Priority Sequencing (typical)
  1. **Month 1-2:** Governance, policy, asset inventory, risk assessment
  2. **Month 2-4:** IAM/access control, vulnerability management (most risk reduction per effort)
  3. **Month 3-6:** Incident response, security monitoring
  4. **Month 4-8:** Compliance program, awareness training
  5. **Month 6-12:** Advanced capabilities (threat hunting, red teaming, DLP)

