id: depmap-iso27001
type: dependency_map
category: compliance
title: "ISO 27001 Implementation Dependency Map"
summary: "Prerequisite chains and critical path for ISO 27001 implementation activities, showing which activities must complete before others can start."
source: "ISO 27001:2022, ISO 27003"
tags: "dependencies, iso27001, isms, critical-path, prerequisites"
metadata:
  critical_path: "Scope -> Risk Assessment -> SoA -> Control Implementation -> Internal Audit -> Management Review -> Certification"
content: |
  ## ISO 27001 Dependency Map

  ### Critical Path
  ```
  Scope Definition (Cl.4.3)
    -> Risk Assessment (Cl.6.1.2)
      -> Statement of Applicability (Cl.6.1.3)
        -> Control Implementation (Cl.8)
          -> Internal Audit (Cl.9.2)
            -> Management Review (Cl.9.3)
              -> Stage 1 Audit
                -> Stage 2 Audit
  ```

  ### Full Dependency Table

  | Activity | Depends On | Blocks |
  |----------|-----------|--------|
  | Context analysis (4.1) | None | Scope definition |
  | Interested parties (4.2) | None | Scope definition |
  | Scope definition (4.3) | Context, Interested parties | Risk assessment, Policy |
  | Information security policy (5.2) | Scope | Control implementation |
  | Roles and responsibilities (5.3) | Scope | All operational activities |
  | Risk assessment methodology | Scope | Risk assessment |
  | Asset inventory | Scope | Risk assessment |
  | Risk assessment (6.1.2) | Methodology, Asset inventory | SoA, Risk treatment plan |
  | SoA (6.1.3) | Risk assessment | Control implementation |
  | Risk treatment plan | Risk assessment | Control implementation |
  | Security objectives (6.2) | Policy, Risk assessment | Monitoring |
  | Competence requirements (7.2) | Roles | Training |
  | Awareness training (7.3) | Policy, Competence | Internal audit |
  | Document control (7.5) | None (start early) | All documentation |
  | Control implementation (8) | SoA, Risk treatment plan | Internal audit |
  | Monitoring and measurement (9.1) | Objectives, Controls | Management review |
  | Internal audit (9.2) | Controls implemented, Training delivered | Management review, Corrective actions |
  | Corrective actions (10.1) | Internal audit | Management review, Stage 1 |
  | Management review (9.3) | Internal audit, Monitoring | Stage 1 audit |
  | Stage 1 audit | Management review, All documentation | Stage 2 audit |
  | Stage 2 audit | Stage 1 findings resolved, 3+ months operation | Certificate |

  ### Parallel Work Streams
  - Policy development can run parallel with risk assessment (after scope is defined)
  - Technical control implementation can start on obvious items while SoA is being finalized
  - Training program development can start while controls are being implemented
  - Document control should be established at project start (supports everything else)

  ### Common Bottlenecks
  - Risk assessment often takes longer than planned (asset inventory is incomplete)
  - SoA approval delayed when management questions control exclusions
  - Internal audit availability (must be independent, often needs external resource)
  - Stage 2 timing requires minimum operating period (typically 3 months of evidence)

