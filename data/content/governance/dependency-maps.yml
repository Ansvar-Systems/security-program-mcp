id: depmap-dora
type: dependency_map
category: compliance
title: "DORA Implementation Dependency Map"
summary: "Prerequisite chains for DORA compliance showing relationships between the five pillars: ICT risk management, incident reporting, resilience testing, third-party management, and information sharing."
source: "DORA Regulation (EU) 2022/2554"
tags: "dependencies, dora, financial-services, ict-risk, resilience, five-pillars"
metadata:
  critical_path: "Gap Analysis -> ICT Risk Framework -> Incident Classification -> Testing Program -> Ongoing Compliance"
content: |
  ## DORA Implementation Dependency Map

  ### Pillar Dependencies
  ```
  Entity Classification
    -> Gap Analysis (all 5 pillars)
      -> Pillar 1: ICT Risk Management Framework
        -> Pillar 2: Incident Reporting (depends on P1 classification)
        -> Pillar 3: Resilience Testing (depends on P1 asset inventory)
        -> Pillar 4: Third-Party Management (depends on P1 governance)
      -> Pillar 5: Information Sharing (independent, can start anytime)
  ```

  ### Cross-Pillar Dependencies

  | Activity | Pillar | Depends On | Blocks |
  |----------|--------|-----------|--------|
  | ICT risk management framework | P1 | Entity classification | P2, P3, P4 |
  | ICT asset inventory | P1 | Framework approval | P3 testing scope |
  | Protection measures | P1 | Asset inventory | P3 testing targets |
  | Detection capabilities | P1 | Protection measures | P2 classification |
  | Incident classification | P2 | P1 detection, RTS criteria | P2 reporting workflow |
  | Reporting workflow | P2 | Classification scheme | Operational readiness |
  | CSIRT contact | P2 | None (start early) | P2 reporting |
  | Basic testing program | P3 | P1 asset inventory | TLPT readiness |
  | TLPT (if designated) | P3 | Basic testing, Budget | Regulatory reporting |
  | Third-party register | P4 | P1 governance framework | Contract remediation |
  | Contract review | P4 | Register, Legal review | Compliance |
  | Concentration risk assessment | P4 | Register complete | Risk treatment |
  | Information sharing | P5 | None (voluntary) | None |

  ### Common Bottlenecks
  - ICT asset inventory is foundation for both testing (P3) and risk management (P1)
  - Contract renegotiation with third parties (P4) can take 6+ months
  - TLPT requires qualified external testers with availability constraints
  - RTS/ITS finalization may require revisiting earlier work
